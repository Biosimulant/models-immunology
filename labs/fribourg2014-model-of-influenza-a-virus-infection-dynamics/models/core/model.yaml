schema_version: '2.0'
title: Fribourg2014 - Model of influenza A virus infection dynamics of viral antagonism
  and innate immune response.
description: This is an ordinary differential equation mathematical model investigating
  the early responses of human monocyte-derived dendritic cells to infection by two
  H1N1 influenza A viruses of different clini. It can be used to explore immune response
  dynamics and compare pathway-level behavior across conditions.
standard: other
tags:
- immunology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- M Fribourg
- B Hartmann
- M Schmolke
- N Marjanovic
- R A Albrecht
