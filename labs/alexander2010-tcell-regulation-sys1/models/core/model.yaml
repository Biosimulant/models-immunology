  - name: unresolved_immune_observable_4
    maps_to: G
    label: Unresolved Immune Observable 4
    description: Unresolved Immune Observable 4. Maps to bundled source symbol `G`.
  - name: unresolved_immune_observable_5
    maps_to: A_im
    label: Unresolved Immune Observable 5
    description: Unresolved Immune Observable 5. Maps to bundled source symbol `A_im`.
