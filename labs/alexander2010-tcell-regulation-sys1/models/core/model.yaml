schema_version: '2.0'
title: Alexander2010_Tcell_Regulation_Sys1
description: 'This is system 1, the model with linear antigen uptake by pAPCs, described
  in the article: Self-tolerance and Autoimmunity in a Regulatory T Cell Model. It
  can be used to explore immune response dynamics and compare pathway-level behavior
  across conditions.'
standard: other
tags:
- immunology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- H K Alexander
- L M Wahl
upstream:
  id: biomodels_ebi:BIOMD0000000289
  source_db: biomodels_ebi
  source_id: BIOMD0000000289
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000289
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000289?filename=BIOMD0000000289_url.xml
  license: CC0
biosim:
  entrypoint: src.alexander2010_tcell_regulation_sys1_biomd0000000289_model:Alexander2010TcellRegulationSys1Biomd0000000289Model
  init_kwargs:
    model_path: data/BIOMD0000000289.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
