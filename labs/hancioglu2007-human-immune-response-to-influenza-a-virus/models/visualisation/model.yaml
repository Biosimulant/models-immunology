schema_version: '2.0'
title: Hancioglu2007 - Human Immune Response to Influenza A virus Infection Lab Visualisation
description: Dedicated presentation model for Hancioglu2007 - Human Immune Response
  to Influenza A virus Infection Lab.
standard: other
tags:
- immunology
- visualisation
authors:
- Biosimulant Team
biosim:
  entrypoint: src.immunology_visualisation:ImmunologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Hancioglu2007 - Human Immune Response to Influenza A virus Infection
      Lab
    question: How do pathogen-associated states and immune response variables shift
      during the simulated run?
    answer_focus: pathogen load, infected-cell states, lymphocyte or cytokine response,
      and dominant excursions
    context: infection_immunity
    sources:
    - alias: immunology_sbml_hancioglu2007_human_immune_response_to_influenza_biomd0000000711_model
      title: Hancioglu2007 - Human Immune Response to Influenza A virus Infection
      visual_scope: Pathogen and immune response
      observables:
      - id: Viral_Load__V
        label: Viral Load V
      - id: Infected_Epithelial_cells__I
        label: Infected Epithelial Cells I
      - id: Healthy_Epithelial_cells__H
        label: Healthy Epithelial Cells H
      - id: APC_cells__M
        label: Antigen Presenting Cell Cells M
      - id: Interferons__F
        label: Interferons F
      - id: Resistant_cells__R
        label: Resistant cells (R)
  communication_step: 1.0
runtime:
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: immunology_sbml_hancioglu2007_human_immune_response_to_influenza_biomd0000000711_model_state
    maps_to: immunology_sbml_hancioglu2007_human_immune_response_to_influenza_biomd0000000711_model.state
    description: Core state record.
  - name: immunology_sbml_hancioglu2007_human_immune_response_to_influenza_biomd0000000711_model_summary
    maps_to: immunology_sbml_hancioglu2007_human_immune_response_to_influenza_biomd0000000711_model.summary
    description: Core summary record.
  - name: immunology_sbml_hancioglu2007_human_immune_response_to_influenza_biomd0000000711_model_species_labels
    maps_to: immunology_sbml_hancioglu2007_human_immune_response_to_influenza_biomd0000000711_model.species_labels
    description: Core source-label map.
  outputs: []
