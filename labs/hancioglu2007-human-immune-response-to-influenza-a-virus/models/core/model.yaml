schema_version: '2.0'
title: Hancioglu2007 - Human Immune Response to Influenza A virus Infection
description: Baris Hancioglu, David Swigon & Gilles Clermont. A dynamical model of
  human immune response to influenza A virus infection.
standard: other
tags:
- immunology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Baris Hancioglu
- David Swigon
- Gilles Clermont
upstream:
  id: biomodels_ebi:BIOMD0000000711
  source_db: biomodels_ebi
  source_id: BIOMD0000000711
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000711
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000711?filename=Hancioglu2007
    - Human Immune Response to Influenza A virus.xml
  license: CC0
biosim:
  entrypoint: src.hancioglu2007_human_immune_response_to_influenza_biomd0000000711_model:Hancioglu2007HumanImmuneResponseToInfluenzaBiomd0000000711Model
  init_kwargs:
    model_path: data/BIOMD0000000711.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
io:
  inputs:
  - name: initial_viral_load_v
    maps_to: Viral_Load__V
    label: Initial Viral Load V
    default: 0.01
    units: native source value
    description: Initial Viral Load V. Sets the initial value of bundled SBML species
      `Viral_Load__V`.
  - name: initial_infected_epithelial_cells_i
    maps_to: Infected_Epithelial_cells__I
    label: Initial Infected Epithelial Cells I
    default: 0.0
    units: native source value
    description: Initial Infected Epithelial Cells I. Sets the initial value of bundled
      SBML species `Infected_Epithelial_cells__I`.
  - name: initial_healthy_epithelial_cells_h
    maps_to: Healthy_Epithelial_cells__H
    label: Initial Healthy Epithelial Cells H
    default: 1.0
    units: native source value
    description: Initial Healthy Epithelial Cells H. Sets the initial value of bundled
      SBML species `Healthy_Epithelial_cells__H`.
  - name: initial_antigen_presenting_cell_cells_m
    maps_to: APC_cells__M
    label: Initial Antigen Presenting Cell Cells M
    default: 0.0
    units: native source value
    description: Initial Antigen Presenting Cell Cells M. Sets the initial value of
      bundled SBML species `APC_cells__M`.
  - name: initial_interferons_f
    maps_to: Interferons__F
    label: Initial Interferons F
    default: 0.0
    units: native source value
    description: Initial Interferons F. Sets the initial value of bundled SBML species
      `Interferons__F`.
  outputs:
  - name: viral_load_v
    maps_to: Viral_Load__V
    label: Viral Load V
    description: Viral Load V. Maps to bundled source symbol `Viral_Load__V`.
  - name: infected_epithelial_cells_i
    maps_to: Infected_Epithelial_cells__I
    label: Infected Epithelial Cells I
    description: Infected Epithelial Cells I. Maps to bundled source symbol `Infected_Epithelial_cells__I`.
  - name: healthy_epithelial_cells_h
    maps_to: Healthy_Epithelial_cells__H
    label: Healthy Epithelial Cells H
    description: Healthy Epithelial Cells H. Maps to bundled source symbol `Healthy_Epithelial_cells__H`.
  - name: antigen_presenting_cell_cells_m
    maps_to: APC_cells__M
    label: Antigen Presenting Cell Cells M
    description: Antigen Presenting Cell Cells M. Maps to bundled source symbol `APC_cells__M`.
  - name: interferons_f
    maps_to: Interferons__F
    label: Interferons F
    description: Interferons F. Maps to bundled source symbol `Interferons__F`.
  - name: state
    description: Full source state record for reproducibility and downstream visualisation.
  - name: summary
    description: Run summary computed from the source model state.
  - name: species_labels
    description: Mapping from source state identifiers to display labels.
