schema_version: '2.0'
title: Tsur2019 - Response of patients with melanoma to immune checkpoint blockade
  Lab
description: This is a simple mathematical population model for pembrolizumab-treated
  advanced melanoma patients, used to predict the response of melanoma patients to
  immune checkpoint inhibitors. It can be used to explore immune response dynamics
  and compare pathway-level behavior across conditions.
models:
- alias: immunology_sbml_tsur2019_response_of_patients_with_melanoma_to_i_biomd0000000838_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
