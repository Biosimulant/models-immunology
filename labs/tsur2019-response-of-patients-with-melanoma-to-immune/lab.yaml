- from: immunology_sbml_tsur2019_response_of_patients_with_melanoma_to_i_biomd0000000838_model.species_labels
  to:
  - visualisation.immunology_sbml_tsur2019_response_of_patients_with_melanoma_to_i_biomd0000000838_model_species_labels
