schema_version: '2.0'
title: Hardiansyah2019 - QSP model of chimeric antigen receptor T-Cell therapy
description: This QSP model explains how the mechanism of action connects to the clinical
  outcomes and, therefore, may serve as an important model-based platform to guide
  the development and personalized dosing of. It can be used to explore immune response
  dynamics and compare pathway-level behavior across conditions.
standard: other
tags:
- immunology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Deni Hardiansyah
- Chee Meng Ng
upstream:
  id: biomodels_ebi:MODEL2009230001
  source_db: biomodels_ebi
  source_id: MODEL2009230001
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL2009230001
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL2009230001?filename=Haridansyah2019.xml
  license: CC0
biosim:
  entrypoint: src.hardiansyah2019_qsp_model_of_chimeric_antigen_re_model2009230001_model:Hardiansyah2019QspModelOfChimericAntigenReModel2009230001Model
  init_kwargs:
    model_path: data/MODEL2009230001.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
io:
