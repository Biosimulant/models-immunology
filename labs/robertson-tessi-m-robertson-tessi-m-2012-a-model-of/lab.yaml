    maps_to: immunology_sbml_robertson_tessi_m_2012_a_model_of_tumor_immune_i_biomd0000000731_model.initial_memtcell
    label: Initial Memtcell
    default: 10000000.0
    units: substance
    description: Initial Memtcell. Sets the initial value of bundled SBML species
      `M`.
  - name: initial_memhelpertcells
    maps_to: immunology_sbml_robertson_tessi_m_2012_a_model_of_tumor_immune_i_biomd0000000731_model.initial_memhelpertcells
    label: Initial Memhelpertcells
    default: 6000000.0
    units: substance
    description: Initial Memhelpertcells. Sets the initial value of bundled SBML species
      `Mh`.
  - name: initial_memeffectorcells
    maps_to: immunology_sbml_robertson_tessi_m_2012_a_model_of_tumor_immune_i_biomd0000000731_model.initial_memeffectorcells
    label: Initial Memeffectorcells
    default: 3000000.0
    units: substance
    description: Initial Memeffectorcells. Sets the initial value of bundled SBML
      species `Me`.
  - name: initial_regmemtcell
    maps_to: immunology_sbml_robertson_tessi_m_2012_a_model_of_tumor_immune_i_biomd0000000731_model.initial_regmemtcell
    label: Initial Regmemtcell
    default: 1000000.0
    units: substance
    description: Initial Regmemtcell. Sets the initial value of bundled SBML species
