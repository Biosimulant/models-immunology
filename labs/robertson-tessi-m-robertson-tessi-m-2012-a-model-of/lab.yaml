- from: immunology_sbml_robertson_tessi_m_2012_a_model_of_tumor_immune_i_biomd0000000731_model.species_labels
  to:
  - visualisation.immunology_sbml_robertson_tessi_m_2012_a_model_of_tumor_immune_i_biomd0000000731_model_species_labels
runtime:
