schema_version: '2.0'
title: Robertson-Tessi M 2012 A model of tumor Immune interaction Lab
description: Its a mathematical model presenting the interaction between a growing
  tumor and immune system. Model involves tumor cells, dendritic cell, helper Tcells,
  regulatory Tcells, effector cells and certain.
models:
- alias: immunology_sbml_robertson_tessi_m_2012_a_model_of_tumor_immune_i_biomd0000000731_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
