  - name: tumor_growth_rate
    maps_to: immunology_sbml_robertson_tessi_m_2012_a_model_of_tumor_immune_i_biomd0000000731_model.tumor_growth_rate
    label: Tumor Growth Rate
    default: 333.0
    units: unit_0
    description: Tumor Growth Rate. Sets bundled SBML parameter `gamma`.
  - name: tumor_cell_killing_rate
    maps_to: immunology_sbml_robertson_tessi_m_2012_a_model_of_tumor_immune_i_biomd0000000731_model.tumor_cell_killing_rate
