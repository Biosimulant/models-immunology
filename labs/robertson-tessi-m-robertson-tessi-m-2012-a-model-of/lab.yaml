  - name: tumor_cell_killing_rate_2
    maps_to: immunology_sbml_robertson_tessi_m_2012_a_model_of_tumor_immune_i_biomd0000000731_model.tumor_cell_killing_rate_2
    label: Tumor Cell Killing Rate 2
    default: 11.0
    units: unit_1
    description: Tumor Cell Killing Rate 2. Sets bundled SBML parameter `k3`.
