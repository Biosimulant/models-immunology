schema_version: '2.0'
title: Khajanchi2017 - Uniform Persistence and Global Stability for a Brain Tumor
  and Immune System Interaction
description: "This paper describes the synergistic interaction between the growth\
  \ of malignant gliomas and the immune system interactions using a system of coupled\
  \ ordinary di\xAEerential equations (ODEs). It can be used to explore immune response\
  \ dynamics and compare pathway-level behavior across conditions."
