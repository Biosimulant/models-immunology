schema_version: '2.0'
title: Arciero2004 - A mathematical model of tumor-immune evasion and siRNA treatment
description: This is a mathematical model consisting of a system of nonlinear ordinary
  differential equations describing tumor cells and immune effectors, as well as the
  immuno-stimulatory and suppressive cytokine. It can be used to explore immune response
  dynamics and compare pathway-level behavior across conditions.
standard: other
tags:
- immunology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Arciero, J.C.
- Jackson, T.L.
- Kirschner, D.E.
