schema_version: '2.0'
title: Arciero2004 - A mathematical model of tumor-immune evasion and siRNA treatment
  Lab
description: This is a mathematical model consisting of a system of nonlinear ordinary
  differential equations describing tumor cells and immune effectors, as well as the
  immuno-stimulatory and suppressive cytokine. It can be used to explore immune response
  dynamics and compare pathway-level behavior across conditions.
models:
- alias: immunology_sbml_arciero2004_a_mathematical_model_of_tumor_immune_model1907310002_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: immunology_sbml_arciero2004_a_mathematical_model_of_tumor_immune_model1907310002_model.state
  to:
  - visualisation.immunology_sbml_arciero2004_a_mathematical_model_of_tumor_immune_model1907310002_model_state
- from: immunology_sbml_arciero2004_a_mathematical_model_of_tumor_immune_model1907310002_model.summary
  to:
  - visualisation.immunology_sbml_arciero2004_a_mathematical_model_of_tumor_immune_model1907310002_model_summary
- from: immunology_sbml_arciero2004_a_mathematical_model_of_tumor_immune_model1907310002_model.species_labels
  to:
  - visualisation.immunology_sbml_arciero2004_a_mathematical_model_of_tumor_immune_model1907310002_model_species_labels
