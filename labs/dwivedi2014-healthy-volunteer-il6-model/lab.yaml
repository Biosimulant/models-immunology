schema_version: '2.0'
title: Dwivedi2014 - Healthy Volunteer IL6 Model Lab
description: 'Dwivedi2014 - Healthy Volunteer IL6Model This model is comprised of
  four models: [BIOMD0000000534] Healthy Volunteer model [BIOMD0000000535] Crohn''s
  Disease - IL-6 Antibody [BIOMD0000000536] Crohn''s D. It can be used to explore
  immune response dynamics and compare pathway-level behavior across conditions.'
models:
- alias: immunology_sbml_dwivedi2014_healthy_volunteer_il6_model_biomd0000000534_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
