- from: immunology_sbml_dwivedi2014_healthy_volunteer_il6_model_biomd0000000534_model.species_labels
  to:
  - visualisation.immunology_sbml_dwivedi2014_healthy_volunteer_il6_model_biomd0000000534_model_species_labels
runtime:
