schema_version: '2.0'
title: Kronik2008 - Improving alloreactive CTL immunotherapy for malignant gliomas
  using a simulation model of their interactive dynamics
description: This mathematical model describes interactions between glioma tumors
  and the immune system that may occur following direct intra-tumoral administration
  of ex-vivo activated alloreactive cytotoxic-T-ly. It can be used to explore immune
  response dynamics and compare pathway-level behavior across conditions.
