schema_version: '2.0'
title: Leon-Triana2021 - Competition between tumour cells and single-target CAR T-cells
description: This model of the use of chimeric antigen receptor (CAR)-T cell therapy
  in the treatment of solid tumours is described in the article:'Dual-Target CAR-Ts
  with On- and Off-Tumour Activity May Override. It can be used to explore immune
  response dynamics and compare pathway-level behavior across conditions.
standard: other
tags:
- immunology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- "Odelaisy Le\xF3n-Triana"
- "Antonio P\xE9rez-Mart\xEDnez"
- "Manuel Ram\xEDrez-Orellana"
- "V\xEDctor M P\xE9rez-Garc\xEDa"
upstream:
  id: biomodels_ebi:BIOMD0000001013
  source_db: biomodels_ebi
  source_id: BIOMD0000001013
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000001013
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000001013?filename=Leon-Triana2021
    - eqs 1 and 2.xml
  license: CC0
biosim:
  entrypoint: src.leon_triana2021_competition_between_tumour_cells_biomd0000001013_model:LeonTriana2021CompetitionBetweenTumourCellsBiomd0000001013Model
  init_kwargs:
    model_path: data/BIOMD0000001013.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
io:
  inputs:
  - name: initial_car_t_cells
    maps_to: CAR_T_cells
    label: Initial Car T Cells
    default: 400000000.0
    units: native source value
    description: Initial Car T Cells. Sets the initial value of bundled SBML species
      `CAR_T_cells`.
  - name: initial_tumour_cells
    maps_to: Tumour_cells
    label: Initial Tumour Cells
    default: 6700000000.0
    units: native source value
    description: Initial Tumour Cells. Sets the initial value of bundled SBML species
      `Tumour_cells`.
  - name: tumour_death_rate
    maps_to: alpha_2
    label: Tumour Death Rate
    default: 2.5e-10
    units: unit_3
    description: Tumour Death Rate. Sets bundled SBML parameter `alpha_2`.
  outputs:
  - name: car_t_cells
    maps_to: CAR_T_cells
    label: Car T Cells
    description: Car T Cells. Maps to bundled source symbol `CAR_T_cells`.
  - name: tumour_cells
    maps_to: Tumour_cells
    label: Tumour Cells
    description: Tumour Cells. Maps to bundled source symbol `Tumour_cells`.
  - name: state
    description: Full source state record for reproducibility and downstream visualisation.
  - name: summary
    description: Run summary computed from the source model state.
  - name: species_labels
    description: Mapping from source state identifiers to display labels.
