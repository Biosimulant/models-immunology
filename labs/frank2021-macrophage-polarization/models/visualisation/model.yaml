schema_version: '2.0'
title: Frank2021 - Macrophage polarization Lab Visualisation
description: Dedicated presentation model for Frank2021 - Macrophage polarization
  Lab.
standard: other
tags:
- immunology
- visualisation
authors:
- Biosimulant Team
biosim:
  entrypoint: src.immunology_visualisation:ImmunologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Frank2021 - Macrophage polarization Lab
    question: Which signaling or cytokine states show the strongest activity during
      the simulation?
    answer_focus: cytokine/signaling trajectories, activation states, and largest
      excursions
    context: immune_signaling
    sources:
    - alias: immunology_sbml_frank2021_macrophage_polarization_biomd0000001060_model
      title: Frank2021 - Macrophage polarization
      visual_scope: Immune signaling activity
      observables:
      - id: x1
        label: Unresolved Signaling Observable 1
      - id: x2
        label: Unresolved Signaling Observable 2
  communication_step: 1.0
runtime:
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: immunology_sbml_frank2021_macrophage_polarization_biomd0000001060_model_state
    maps_to: immunology_sbml_frank2021_macrophage_polarization_biomd0000001060_model.state
    description: Core state record.
  - name: immunology_sbml_frank2021_macrophage_polarization_biomd0000001060_model_summary
    maps_to: immunology_sbml_frank2021_macrophage_polarization_biomd0000001060_model.summary
    description: Core summary record.
  - name: immunology_sbml_frank2021_macrophage_polarization_biomd0000001060_model_species_labels
    maps_to: immunology_sbml_frank2021_macrophage_polarization_biomd0000001060_model.species_labels
    description: Core source-label map.
  outputs: []
