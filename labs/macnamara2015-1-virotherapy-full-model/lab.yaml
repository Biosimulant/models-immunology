schema_version: '2.0'
title: Macnamara2015/1 - virotherapy full model Lab
description: 'The paper describes a full model of oncolytic virotherapy. Created by
  COPASI 4.25 (Build 207) This model is described in the article: Memory versus effector
  immune responses in oncolytic virotherapies.'
models:
- alias: immunology_sbml_macnamara2015_1_virotherapy_full_model_biomd0000000766_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
