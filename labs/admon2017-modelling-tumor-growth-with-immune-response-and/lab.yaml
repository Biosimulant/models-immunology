schema_version: '2.0'
title: Admon2017 - Modelling tumor growth with immune response and drug using ordinary
  differential equations Lab
description: Modelling tumor growth with immune response and drug using ordinary differential
  equationsMohd Rashid Admon, Normah MaanThis is a mathematical study about tumor
  growth from a different perspective, wi. It can be used to explore immune response
  dynamics and compare pathway-level behavior across conditions.
