schema_version: '2.0'
title: Bunimovich-Mendrazitsky2007 - Mathematical model of BCG immunotherapy Lab
description: This ordinary differential equation model, simulating the tumor-immune
  interactions involved in BCG immunotherapy to treat superficial bladder cancer,
  is described by the publication:Bunimovich-Mendra. It can be used to explore immune
  response dynamics and compare pathway-level behavior across conditions.
models:
- alias: immunology_sbml_bunimovich_mendrazitsky2007_mathematical_model_o_biomd0000001034_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: immunology_sbml_bunimovich_mendrazitsky2007_mathematical_model_o_biomd0000001034_model.state
  to:
  - visualisation.immunology_sbml_bunimovich_mendrazitsky2007_mathematical_model_o_biomd0000001034_model_state
- from: immunology_sbml_bunimovich_mendrazitsky2007_mathematical_model_o_biomd0000001034_model.summary
  to:
  - visualisation.immunology_sbml_bunimovich_mendrazitsky2007_mathematical_model_o_biomd0000001034_model_summary
- from: immunology_sbml_bunimovich_mendrazitsky2007_mathematical_model_o_biomd0000001034_model.species_labels
  to:
  - visualisation.immunology_sbml_bunimovich_mendrazitsky2007_mathematical_model_o_biomd0000001034_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
io:
  inputs:
  - name: initial_effector_cells
    maps_to: immunology_sbml_bunimovich_mendrazitsky2007_mathematical_model_o_biomd0000001034_model.initial_effector_cells
    label: Initial Effector Cells
    default: 0.05
    units: native source value
    description: Initial Effector Cells. Sets the initial value of bundled SBML species
      `Effector_cells`.
  - name: initial_tumor_infected_cells
    maps_to: immunology_sbml_bunimovich_mendrazitsky2007_mathematical_model_o_biomd0000001034_model.initial_tumor_infected_cells
    label: Initial Tumor Infected Cells
    default: 0.0
    units: native source value
    description: Initial Tumor Infected Cells. Sets the initial value of bundled SBML
      species `Tumor_infected_cells`.
  - name: initial_tumor_uninfected_cells
    maps_to: immunology_sbml_bunimovich_mendrazitsky2007_mathematical_model_o_biomd0000001034_model.initial_tumor_uninfected_cells
    label: Initial Tumor Uninfected Cells
    default: 0.55
    units: native source value
    description: Initial Tumor Uninfected Cells. Sets the initial value of bundled
      SBML species `Tumor_uninfected_cells`.
  - name: initial_bcg
    maps_to: immunology_sbml_bunimovich_mendrazitsky2007_mathematical_model_o_biomd0000001034_model.initial_bcg
    label: Initial BCG
    default: 0.0
    units: native source value
    description: Initial BCG. Sets the initial value of bundled SBML species `BCG`.
  - name: tumor_growth_rate
    maps_to: immunology_sbml_bunimovich_mendrazitsky2007_mathematical_model_o_biomd0000001034_model.tumor_growth_rate
    label: Tumor Growth Rate
    default: 0.0155
    units: native source value
    description: Tumor Growth Rate. Sets bundled SBML parameter `beta`.
  - name: tumor_growth_rate_2
    maps_to: immunology_sbml_bunimovich_mendrazitsky2007_mathematical_model_o_biomd0000001034_model.tumor_growth_rate_2
    label: Tumor Growth Rate 2
    default: 0.12
    units: native source value
    description: Tumor Growth Rate 2. Sets bundled SBML parameter `r`.
  outputs:
  - name: effector_cells
    maps_to: immunology_sbml_bunimovich_mendrazitsky2007_mathematical_model_o_biomd0000001034_model.effector_cells
  - name: tumor_infected_cells
    maps_to: immunology_sbml_bunimovich_mendrazitsky2007_mathematical_model_o_biomd0000001034_model.tumor_infected_cells
  - name: tumor_uninfected_cells
    maps_to: immunology_sbml_bunimovich_mendrazitsky2007_mathematical_model_o_biomd0000001034_model.tumor_uninfected_cells
  - name: bcg
    maps_to: immunology_sbml_bunimovich_mendrazitsky2007_mathematical_model_o_biomd0000001034_model.bcg
  - name: state
    maps_to: immunology_sbml_bunimovich_mendrazitsky2007_mathematical_model_o_biomd0000001034_model.state
  - name: summary
    maps_to: immunology_sbml_bunimovich_mendrazitsky2007_mathematical_model_o_biomd0000001034_model.summary
  - name: species_labels
    maps_to: immunology_sbml_bunimovich_mendrazitsky2007_mathematical_model_o_biomd0000001034_model.species_labels
