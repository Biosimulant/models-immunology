schema_version: '2.0'
title: Smith2011 - Three Stage Innate Immune Response to a Pneumococcal Lung Infection
description: Pneumococcal pneumonia is a leading cause of death and a major source
  of human morbidity. The initial immune response plays a central role in determining
  the course and outcome of pneumococcal disease.
standard: other
tags:
- immunology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Amber M Smith
- Jonathan A McCullers
- Frederick R Adler
upstream:
  id: biomodels_ebi:BIOMD0000000924
  source_db: biomodels_ebi
  source_id: BIOMD0000000924
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000924
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000924?filename=Smith2011_V1.xml
  license: CC0
biosim:
  entrypoint: src.smith2011_three_stage_innate_immune_response_to_biomd0000000924_model:Smith2011ThreeStageInnateImmuneResponseToBiomd0000000924Model
  init_kwargs:
    model_path: data/BIOMD0000000924.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
io:
  inputs:
  - name: initial_epithelial_cells_with_bacteria_attached_ea
    maps_to: Epithelial_cells_with_bacteria_attached__Ea
    label: Initial Epithelial Cells With Bacteria Attached Ea
    default: 0.0
    units: substance
    description: Initial Epithelial Cells With Bacteria Attached Ea. Sets the initial
      value of bundled SBML species `Epithelial_cells_with_bacteria_attached__Ea`.
  - name: initial_pneumococci_p
    maps_to: Pneumococci___P
    label: Initial Pneumococci P
    default: 100000.0
    units: substance
    description: Initial Pneumococci P. Sets the initial value of bundled SBML species
      `Pneumococci___P`.
  - name: initial_susceptible_epithelial_cells_eu
    maps_to: Susceptible_epithelial_cells__EU
    label: Initial Susceptible Epithelial Cells Eu
    default: 100000000.0
    units: substance
    description: Initial Susceptible Epithelial Cells Eu. Sets the initial value of
      bundled SBML species `Susceptible_epithelial_cells__EU`.
  - name: initial_proinflammatory_cytokine_c
    maps_to: proinflammatory_cytokine__C
    label: Initial Proinflammatory Cytokine C
    default: 0.0
    units: substance
    description: Initial Proinflammatory Cytokine C. Sets the initial value of bundled
      SBML species `proinflammatory_cytokine__C`.
  - name: initial_neutrophils_n
    maps_to: Neutrophils__N
    label: Initial Neutrophils N
    default: 0.0
    units: substance
    description: Initial Neutrophils N. Sets the initial value of bundled SBML species
      `Neutrophils__N`.
  outputs:
  - name: epithelial_cells_with_bacteria_attached_ea
    maps_to: Epithelial_cells_with_bacteria_attached__Ea
    label: Epithelial Cells With Bacteria Attached Ea
    description: Epithelial Cells With Bacteria Attached Ea. Maps to bundled source
      symbol `Epithelial_cells_with_bacteria_attached__Ea`.
  - name: pneumococci_p
    maps_to: Pneumococci___P
    label: Pneumococci P
    description: Pneumococci P. Maps to bundled source symbol `Pneumococci___P`.
  - name: susceptible_epithelial_cells_eu
    maps_to: Susceptible_epithelial_cells__EU
    label: Susceptible Epithelial Cells Eu
    description: Susceptible Epithelial Cells Eu. Maps to bundled source symbol `Susceptible_epithelial_cells__EU`.
  - name: proinflammatory_cytokine_c
    maps_to: proinflammatory_cytokine__C
    label: Proinflammatory Cytokine C
    description: Proinflammatory Cytokine C. Maps to bundled source symbol `proinflammatory_cytokine__C`.
  - name: neutrophils_n
    maps_to: Neutrophils__N
    label: Neutrophils N
    description: Neutrophils N. Maps to bundled source symbol `Neutrophils__N`.
  - name: state
    description: Full source state record for reproducibility and downstream visualisation.
  - name: summary
    description: Run summary computed from the source model state.
  - name: species_labels
    description: Mapping from source state identifiers to display labels.
