schema_version: '2.0'
title: Bianca2012 - Mathematical modeling of the immune system recognition to mammary
  carcinoma antigen
description: This model describes the humoral and cellular response of the immune
  system to a tumor associate antigen and the recognition process between B cells,
  T cells and antigen presenting cells. It can be used to explore immune response
  dynamics and compare pathway-level behavior across conditions.
standard: other
tags:
- immunology
- sbml
- biomodels_ebi
