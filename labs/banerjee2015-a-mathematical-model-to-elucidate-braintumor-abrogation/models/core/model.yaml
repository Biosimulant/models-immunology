schema_version: '2.0'
title: Banerjee2015 - A Mathematical Model to Elucidate BrainTumor Abrogation by Immunotherapywith
  T11 Target Structure
description: T11 Target structure (T11TS), a membrane glycoprotein isolated from sheep
  erythrocytes, reverses the immune suppressed state of brain tumor induced animals
  by boosting the functional status of the imm. It can be used to explore immune response
  dynamics and compare pathway-level behavior across conditions.
