schema_version: '2.0'
title: Schokker2013 - A mathematical model representing cellular immune development
  and response to Salmonella of chicken intestinal tissue Lab
description: This is a dynamic mathematical model describing the development of the
  cellular branch of the intestinal immune system of poultry during the first 42 days
  of life, and of its response towards an oral. It can be used to explore immune response
  dynamics and compare pathway-level behavior across conditions.
models:
- alias: immunology_sbml_schokker2013_a_mathematical_model_representing_c_biomd0000000895_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: immunology_sbml_schokker2013_a_mathematical_model_representing_c_biomd0000000895_model.state
  to:
  - visualisation.immunology_sbml_schokker2013_a_mathematical_model_representing_c_biomd0000000895_model_state
- from: immunology_sbml_schokker2013_a_mathematical_model_representing_c_biomd0000000895_model.summary
  to:
  - visualisation.immunology_sbml_schokker2013_a_mathematical_model_representing_c_biomd0000000895_model_summary
- from: immunology_sbml_schokker2013_a_mathematical_model_representing_c_biomd0000000895_model.species_labels
  to:
  - visualisation.immunology_sbml_schokker2013_a_mathematical_model_representing_c_biomd0000000895_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
