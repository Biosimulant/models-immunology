    maps_to: immunology_sbml_schokker2013_a_mathematical_model_representing_c_biomd0000000895_model.initial_cd4
    label: Initial CD4
    default: 9000000.0
    units: native source value
    description: Initial CD4. Sets the initial value of bundled SBML species `CD4`.
  - name: initial_cd8
    maps_to: immunology_sbml_schokker2013_a_mathematical_model_representing_c_biomd0000000895_model.initial_cd8
    label: Initial CD8
    default: 7000000.0
    units: native source value
    description: Initial CD8. Sets the initial value of bundled SBML species `CD8`.
  - name: initial_cd4_receptor
    maps_to: immunology_sbml_schokker2013_a_mathematical_model_representing_c_biomd0000000895_model.initial_cd4_receptor
    label: Initial CD4 Receptor
    default: 27000000.0
    units: native source value
    description: Initial CD4 Receptor. Sets the initial value of bundled SBML species
      `CD4rec`.
  - name: initial_unresolved_immune_observable_1
    maps_to: immunology_sbml_schokker2013_a_mathematical_model_representing_c_biomd0000000895_model.initial_unresolved_immune_observable_1
    label: Initial Unresolved Immune Observable 1
    default: 9000000.0
