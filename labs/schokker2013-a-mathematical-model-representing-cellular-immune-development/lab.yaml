    maps_to: immunology_sbml_schokker2013_a_mathematical_model_representing_c_biomd0000000895_model.cd4
  - name: cd8
    maps_to: immunology_sbml_schokker2013_a_mathematical_model_representing_c_biomd0000000895_model.cd8
