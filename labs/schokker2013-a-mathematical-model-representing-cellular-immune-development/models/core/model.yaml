schema_version: '2.0'
title: Schokker2013 - A mathematical model representing cellular immune development
  and response to Salmonella of chicken intestinal tissue
description: This is a dynamic mathematical model describing the development of the
  cellular branch of the intestinal immune system of poultry during the first 42 days
  of life, and of its response towards an oral. It can be used to explore immune response
  dynamics and compare pathway-level behavior across conditions.
standard: other
tags:
- immunology
- sbml
