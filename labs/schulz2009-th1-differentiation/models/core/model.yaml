- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Edda G Schulz
- Luca Mariani
- Andreas Radbruch
- "Thomas H\xF6fer"
upstream:
  id: biomodels_ebi:BIOMD0000000215
  source_db: biomodels_ebi
  source_id: BIOMD0000000215
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000215
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000215?filename=BIOMD0000000215_url.xml
  license: CC0
biosim:
  entrypoint: src.schulz2009_th1_differentiation_biomd0000000215_model:Schulz2009Th1DifferentiationBiomd0000000215Model
  init_kwargs:
    model_path: data/BIOMD0000000215.xml
  communication_step: 1.0
runtime:
