    maps_to: immunology_sbml_manda2019_acute_hepatitis_b_virus_infection_mode_model1911280002_model.unresolved_infection_observable_2
  - name: unresolved_infection_observable_3
    maps_to: immunology_sbml_manda2019_acute_hepatitis_b_virus_infection_mode_model1911280002_model.unresolved_infection_observable_3
  - name: unresolved_infection_observable_4
    maps_to: immunology_sbml_manda2019_acute_hepatitis_b_virus_infection_mode_model1911280002_model.unresolved_infection_observable_4
  - name: unresolved_infection_observable_5
    maps_to: immunology_sbml_manda2019_acute_hepatitis_b_virus_infection_mode_model1911280002_model.unresolved_infection_observable_5
  - name: state
    maps_to: immunology_sbml_manda2019_acute_hepatitis_b_virus_infection_mode_model1911280002_model.state
  - name: summary
    maps_to: immunology_sbml_manda2019_acute_hepatitis_b_virus_infection_mode_model1911280002_model.summary
  - name: species_labels
    maps_to: immunology_sbml_manda2019_acute_hepatitis_b_virus_infection_mode_model1911280002_model.species_labels
