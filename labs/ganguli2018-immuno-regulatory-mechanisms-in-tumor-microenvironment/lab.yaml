schema_version: '2.0'
title: Ganguli2018-immuno regulatory mechanisms in tumor microenvironment Lab
description: This model describes the concept of Cancer Stem Cells(CSC) differentiation
  and tumor-immune interaction into a generic model that has been validated with known
  experimental data. It can be used to explore immune response dynamics and compare
  pathway-level behavior across conditions.
models:
- alias: immunology_sbml_ganguli2018_immuno_regulatory_mechanisms_in_tumo_biomd0000000810_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: immunology_sbml_ganguli2018_immuno_regulatory_mechanisms_in_tumo_biomd0000000810_model.state
  to:
  - visualisation.immunology_sbml_ganguli2018_immuno_regulatory_mechanisms_in_tumo_biomd0000000810_model_state
- from: immunology_sbml_ganguli2018_immuno_regulatory_mechanisms_in_tumo_biomd0000000810_model.summary
  to:
  - visualisation.immunology_sbml_ganguli2018_immuno_regulatory_mechanisms_in_tumo_biomd0000000810_model_summary
- from: immunology_sbml_ganguli2018_immuno_regulatory_mechanisms_in_tumo_biomd0000000810_model.species_labels
  to:
  - visualisation.immunology_sbml_ganguli2018_immuno_regulatory_mechanisms_in_tumo_biomd0000000810_model_species_labels
