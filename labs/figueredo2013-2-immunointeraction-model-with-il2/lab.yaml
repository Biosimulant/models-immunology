title: Figueredo2013/2 - immunointeraction model with IL2 Lab
description: 'The paper describes a model of immune-itumor interaction with IL2.Created
  by COPASI 4.25 (Build 207) This model is described in the article: Investigating
  mathematical models of immuno-interactions wi. It can be used to explore immune
  response dynamics and compare pathway-level behavior across conditions.'
