schema_version: '2.0'
title: Dubey2007 - A mathematical model for the effect of toxicant on the immune system
  (without toxicant effect) Model1 Lab
description: In this paper, a nonlinear mathematical model is proposed and analyzed
  to study theeffect of environmental toxicant on the immune response of the body.
  It can be used to explore immune response dynamics and compare pathway-level behavior
  across conditions.
