schema_version: '2.0'
title: Baker2013 - Cytokine Mediated Inflammation in Rheumatoid Arthritis Lab Visualisation
description: Dedicated presentation model for Baker2013 - Cytokine Mediated Inflammation
  in Rheumatoid Arthritis Lab.
standard: other
tags:
- immunology
- visualisation
authors:
- Biosimulant Team
biosim:
  entrypoint: src.immunology_visualisation:ImmunologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Baker2013 - Cytokine Mediated Inflammation in Rheumatoid Arthritis
      Lab
    question: Which signaling or cytokine states show the strongest activity during
      the simulation?
    answer_focus: cytokine/signaling trajectories, activation states, and largest
      excursions
    context: immune_signaling
    sources:
    - alias: immunology_sbml_baker2013_cytokine_mediated_inflammation_in_rheu_biomd0000000550_model
      title: Baker2013 - Cytokine Mediated Inflammation in Rheumatoid Arthritis
      visual_scope: Immune signaling activity
      observables:
      - id: species_1
        label: Unresolved Signaling Observable 1
      - id: species_2
        label: Unresolved Source Observable 2
  communication_step: 1.0
runtime:
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: immunology_sbml_baker2013_cytokine_mediated_inflammation_in_rheu_biomd0000000550_model_state
    maps_to: immunology_sbml_baker2013_cytokine_mediated_inflammation_in_rheu_biomd0000000550_model.state
    description: Core state record.
  - name: immunology_sbml_baker2013_cytokine_mediated_inflammation_in_rheu_biomd0000000550_model_summary
    maps_to: immunology_sbml_baker2013_cytokine_mediated_inflammation_in_rheu_biomd0000000550_model.summary
    description: Core summary record.
  - name: immunology_sbml_baker2013_cytokine_mediated_inflammation_in_rheu_biomd0000000550_model_species_labels
    maps_to: immunology_sbml_baker2013_cytokine_mediated_inflammation_in_rheu_biomd0000000550_model.species_labels
    description: Core source-label map.
  outputs: []
