schema_version: '2.0'
title: dePillis2005 - A validated mathematical model of cell-mediated immune response
  to tumor growth Lab
description: This model describes interactions between a tumour and the immune system,
  with specific emphasis on the role of natural killer and CD8-positive T cells in
  tumor surveillance. It can be used to explore immune response dynamics and compare
  pathway-level behavior across conditions.
models:
- alias: immunology_sbml_depillis2005_a_validated_mathematical_model_of_c_model1907260001_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: immunology_sbml_depillis2005_a_validated_mathematical_model_of_c_model1907260001_model.state
  to:
  - visualisation.immunology_sbml_depillis2005_a_validated_mathematical_model_of_c_model1907260001_model_state
- from: immunology_sbml_depillis2005_a_validated_mathematical_model_of_c_model1907260001_model.summary
  to:
  - visualisation.immunology_sbml_depillis2005_a_validated_mathematical_model_of_c_model1907260001_model_summary
- from: immunology_sbml_depillis2005_a_validated_mathematical_model_of_c_model1907260001_model.species_labels
  to:
  - visualisation.immunology_sbml_depillis2005_a_validated_mathematical_model_of_c_model1907260001_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
io:
  inputs:
  - name: initial_unresolved_tumor_observable_1
    maps_to: immunology_sbml_depillis2005_a_validated_mathematical_model_of_c_model1907260001_model.initial_unresolved_tumor_observable_1
    label: Initial Unresolved Tumor Observable 1
    default: 100.0
    units: native source value
    description: Initial Unresolved Tumor Observable 1. Sets the initial value of
      bundled SBML species `T`.
  - name: initial_unresolved_tumor_observable_2
    maps_to: immunology_sbml_depillis2005_a_validated_mathematical_model_of_c_model1907260001_model.initial_unresolved_tumor_observable_2
    label: Initial Unresolved Tumor Observable 2
    default: 1000.0
    units: native source value
    description: Initial Unresolved Tumor Observable 2. Sets the initial value of
      bundled SBML species `N`.
  - name: initial_unresolved_tumor_observable_3
    maps_to: immunology_sbml_depillis2005_a_validated_mathematical_model_of_c_model1907260001_model.initial_unresolved_tumor_observable_3
    label: Initial Unresolved Tumor Observable 3
    default: 0.0
    units: native source value
    description: Initial Unresolved Tumor Observable 3. Sets the initial value of
      bundled SBML species `L`.
  - name: tumor_killing_natural_killer_rate
    maps_to: immunology_sbml_depillis2005_a_validated_mathematical_model_of_c_model1907260001_model.tumor_killing_natural_killer_rate
    label: Tumor Killing Natural Killer Rate
    default: 3.23e-07
    units: native source value
    description: Tumor Killing Natural Killer Rate. Sets bundled SBML parameter `c`.
  outputs:
  - name: unresolved_tumor_observable_1
    maps_to: immunology_sbml_depillis2005_a_validated_mathematical_model_of_c_model1907260001_model.unresolved_tumor_observable_1
  - name: unresolved_tumor_observable_2
    maps_to: immunology_sbml_depillis2005_a_validated_mathematical_model_of_c_model1907260001_model.unresolved_tumor_observable_2
  - name: unresolved_tumor_observable_3
    maps_to: immunology_sbml_depillis2005_a_validated_mathematical_model_of_c_model1907260001_model.unresolved_tumor_observable_3
  - name: state
    maps_to: immunology_sbml_depillis2005_a_validated_mathematical_model_of_c_model1907260001_model.state
  - name: summary
    maps_to: immunology_sbml_depillis2005_a_validated_mathematical_model_of_c_model1907260001_model.summary
  - name: species_labels
