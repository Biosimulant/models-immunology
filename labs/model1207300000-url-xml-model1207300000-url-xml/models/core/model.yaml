    maps_to: s1
    label: Initial Acoa
    default: 0.0
    units: native source value
    description: Initial Acoa. Sets the initial value of bundled SBML species `s1`.
  - name: initial_hmg_coa
    maps_to: s2
    label: Initial Hmg Coa
    default: 0.0
    units: native source value
    description: Initial Hmg Coa. Sets the initial value of bundled SBML species `s2`.
  - name: initial_unresolved_signaling_observable_1
    maps_to: s3
    label: Initial Unresolved Signaling Observable 1
    default: 0.0
    units: native source value
    description: Initial Unresolved Signaling Observable 1. Sets the initial value
      of bundled SBML species `s3`.
  - name: initial_unresolved_signaling_observable_1_2
    maps_to: s4
    label: Initial Unresolved Signaling Observable 1 2
    default: 0.0
    units: native source value
    description: Initial Unresolved Signaling Observable 1 2. Sets the initial value
      of bundled SBML species `s4`.
  - name: initial_unresolved_signaling_observable_2
    maps_to: s5
    label: Initial Unresolved Signaling Observable 2
    default: 0.0
    units: native source value
    description: Initial Unresolved Signaling Observable 2. Sets the initial value
