    description: Unresolved Signaling Observable 1 2. Maps to bundled source symbol
      `s4`.
  - name: unresolved_signaling_observable_2
    maps_to: s5
    label: Unresolved Signaling Observable 2
    description: Unresolved Signaling Observable 2. Maps to bundled source symbol
      `s5`.
  - name: state
    description: Full source state record for reproducibility and downstream visualisation.
  - name: summary
    description: Run summary computed from the source model state.
  - name: species_labels
