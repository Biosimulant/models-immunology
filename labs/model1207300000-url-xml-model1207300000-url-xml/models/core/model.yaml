schema_version: '2.0'
title: MODEL1207300000_url.xml
description: 'This model is from the article: A model of flux regulation in the cholesterol
  biosynthesis pathway: Immune mediated graduated flux reduction versus statin-like
  led stepped flux reduction. It can be used to explore immune response dynamics and
  compare pathway-level behavior across conditions.'
standard: other
tags:
- immunology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Steven Watterson
- Maria Luisa Guerriero
- Mathieu Blanc
- Alexander Mazein
- Laurence Loewe
upstream:
