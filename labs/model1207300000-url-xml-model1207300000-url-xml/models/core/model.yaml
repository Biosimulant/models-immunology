    maps_to: s1
    label: Acoa
    description: Acoa. Maps to bundled source symbol `s1`.
  - name: hmg_coa
    maps_to: s2
    label: Hmg Coa
    description: Hmg Coa. Maps to bundled source symbol `s2`.
  - name: unresolved_signaling_observable_1
    maps_to: s3
    label: Unresolved Signaling Observable 1
    description: Unresolved Signaling Observable 1. Maps to bundled source symbol
