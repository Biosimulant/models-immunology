schema_version: '2.0'
title: Yu2019 - A mathematical model of tumor-immune interactions with an immune checkpoint
  inhibitor
description: This is a mathematical model investigating interactions among malignant
  tumor cells, CD4+ T cells, anti-tumor cytokines (specifically IFN-gamma), and the
  immune checkpoint inhibitor CTLA-4 to assess t. It can be used to explore immune
  response dynamics and compare pathway-level behavior across conditions.
standard: other
tags:
- immunology
- sbml
- biomodels_ebi
- faithful
- curated
