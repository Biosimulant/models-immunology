schema_version: '2.0'
title: Chrobak2011 - A mathematical model of induced cancer-adaptive immune system
  competition
description: This is a mathematical model describing competition between an artificially
  induced tumor and the adaptive immune system based on the use of an autonomous system
  of ordinary differential equations. It can be used to explore immune response dynamics
  and compare pathway-level behavior across conditions.
standard: other
tags:
- immunology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Chrobak, J.M.
- Herrero, H.
upstream:
  id: biomodels_ebi:BIOMD0000000815
  source_db: biomodels_ebi
  source_id: BIOMD0000000815
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000815
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000815?filename=Chrobak2011.xml
  license: CC0
biosim:
  entrypoint: src.chrobak2011_a_mathematical_model_of_induced_canc_biomd0000000815_model:Chrobak2011AMathematicalModelOfInducedCancBiomd0000000815Model
  init_kwargs:
    model_path: data/BIOMD0000000815.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
io:
  inputs:
  - name: initial_cancer
    maps_to: x_Cancer
    label: Initial Cancer
    default: 0.0005
    units: native source value
    description: Initial Cancer. Sets the initial value of bundled SBML species `x_Cancer`.
  - name: initial_immune_system
    maps_to: y_Immune_System
    label: Initial Immune System
    default: 0.01
    units: native source value
    description: Initial Immune System. Sets the initial value of bundled SBML species
      `y_Immune_System`.
  outputs:
  - name: cancer
    maps_to: x_Cancer
    label: Cancer
    description: Cancer. Maps to bundled source symbol `x_Cancer`.
  - name: immune_system
    maps_to: y_Immune_System
    label: Immune System
    description: Immune System. Maps to bundled source symbol `y_Immune_System`.
  - name: state
    description: Full source state record for reproducibility and downstream visualisation.
  - name: summary
    description: Run summary computed from the source model state.
  - name: species_labels
    description: Mapping from source state identifiers to display labels.
