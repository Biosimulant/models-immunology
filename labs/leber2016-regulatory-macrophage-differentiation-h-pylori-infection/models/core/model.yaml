schema_version: '2.0'
title: Leber2016 - Regulatory macrophage differentiation - H.pylori infection
description: The model is the second model of the publication 'Modeling the role of
  lanthionine synthetase C-like 2 (LANCL2) in the modulation of immune responses to
  Helicobacter pylori infection' published in Plo. It can be used to explore immune
  response dynamics and compare pathway-level behavior across conditions.
standard: other
tags:
- immunology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Andrew Leber
- Josep Bassaganya-Riera
- Nuria Tubau-Juni
- Monica Viladomiu
- Vida Abedi
upstream:
  id: biomodels_ebi:MODEL1611160001
  source_db: biomodels_ebi
  source_id: MODEL1611160001
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL1611160001
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL1611160001?filename=MODEL1611160001_url.xml
  license: CC0
biosim:
  entrypoint: src.leber2016_regulatory_macrophage_differentiation_model1611160001_model:Leber2016RegulatoryMacrophageDifferentiationModel1611160001Model
  init_kwargs:
    model_path: data/MODEL1611160001.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
io:
  inputs:
  - name: initial_cx3cr1_receptor
    maps_to: s1
    label: Initial Cx3cr1 Receptor
    default: 0.0
    units: native source value
    description: Initial Cx3cr1 Receptor. Sets the initial value of bundled SBML species
      `s1`.
  - name: initial_unresolved_infection_observable_1
    maps_to: s2
    label: Initial Unresolved Infection Observable 1
    default: 0.0
    units: native source value
    description: Initial Unresolved Infection Observable 1. Sets the initial value
      of bundled SBML species `s2`.
  - name: initial_erk
    maps_to: s3
    label: Initial ERK
    default: 0.0
    units: native source value
    description: Initial ERK. Sets the initial value of bundled SBML species `s3`.
  - name: initial_unresolved_infection_observable_2
    maps_to: s4
    label: Initial Unresolved Infection Observable 2
    default: 0.0
    units: native source value
    description: Initial Unresolved Infection Observable 2. Sets the initial value
      of bundled SBML species `s4`.
  outputs:
  - name: cx3cr1_receptor
    maps_to: s1
    label: Cx3cr1 Receptor
    description: Cx3cr1 Receptor. Maps to bundled source symbol `s1`.
  - name: unresolved_infection_observable_1
    maps_to: s2
    label: Unresolved Infection Observable 1
    description: Unresolved Infection Observable 1. Maps to bundled source symbol
      `s2`.
  - name: erk
    maps_to: s3
    label: ERK
    description: ERK. Maps to bundled source symbol `s3`.
  - name: unresolved_infection_observable_2
    maps_to: s4
    label: Unresolved Infection Observable 2
    description: Unresolved Infection Observable 2. Maps to bundled source symbol
      `s4`.
  - name: unresolved_infection_observable_3
    maps_to: s5
    label: Unresolved Infection Observable 3
    description: Unresolved Infection Observable 3. Maps to bundled source symbol
      `s5`.
  - name: state
    description: Full source state record for reproducibility and downstream visualisation.
  - name: summary
    description: Run summary computed from the source model state.
  - name: species_labels
    description: Mapping from source state identifiers to display labels.
