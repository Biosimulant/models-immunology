schema_version: '2.0'
title: Yamada2003 JAK STAT SOCS1 knockout Lab
description: 'NCBS Curation Comments: This model shows the control mechanism of Jak-Stat
  pathway, here SOCS1 (Suppressor of cytokine signaling-I) was identified as the negative
  regulator of Jak and STAT signal tran. It can be used to explore immune response
  dynamics and compare pathway-level behavior across conditions.'
models:
- alias: immunology_sbml_yamada2003_jak_stat_socs1_knockout_biomd0000000094_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: immunology_sbml_yamada2003_jak_stat_socs1_knockout_biomd0000000094_model.state
  to:
  - visualisation.immunology_sbml_yamada2003_jak_stat_socs1_knockout_biomd0000000094_model_state
- from: immunology_sbml_yamada2003_jak_stat_socs1_knockout_biomd0000000094_model.summary
  to:
  - visualisation.immunology_sbml_yamada2003_jak_stat_socs1_knockout_biomd0000000094_model_summary
- from: immunology_sbml_yamada2003_jak_stat_socs1_knockout_biomd0000000094_model.species_labels
  to:
  - visualisation.immunology_sbml_yamada2003_jak_stat_socs1_knockout_biomd0000000094_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
io:
  inputs:
  - name: initial_interferon_receptor_jak_complex
    maps_to: immunology_sbml_yamada2003_jak_stat_socs1_knockout_biomd0000000094_model.initial_interferon_receptor_jak_complex
    label: Initial Interferon Receptor JAK Complex
    default: 0.0
    units: native source value
    description: Initial Interferon Receptor JAK Complex. Sets the initial value of
      bundled SBML species `IFNRJ`.
  - name: initial_receptor_jak_complex
    maps_to: immunology_sbml_yamada2003_jak_stat_socs1_knockout_biomd0000000094_model.initial_receptor_jak_complex
    label: Initial Receptor JAK Complex
    default: 0.0
    units: native source value
    description: Initial Receptor JAK Complex. Sets the initial value of bundled SBML
      species `RJ`.
  - name: initial_ifnrj_dimer
    maps_to: immunology_sbml_yamada2003_jak_stat_socs1_knockout_biomd0000000094_model.initial_ifnrj_dimer
    label: Initial Ifnrj Dimer
    default: 0.0
    units: native source value
    description: Initial Ifnrj Dimer. Sets the initial value of bundled SBML species
      `IFNRJ2`.
  - name: initial_activated_ifnrj_complex
    maps_to: immunology_sbml_yamada2003_jak_stat_socs1_knockout_biomd0000000094_model.initial_activated_ifnrj_complex
    label: Initial Activated Ifnrj Complex
    default: 0.0
    units: native source value
    description: Initial Activated Ifnrj Complex. Sets the initial value of bundled
      SBML species `IFNRJ2_star`.
  - name: initial_interferon_receptor_jak2_stat1_complex
    maps_to: immunology_sbml_yamada2003_jak_stat_socs1_knockout_biomd0000000094_model.initial_interferon_receptor_jak2_stat1_complex
    label: Initial Interferon Receptor Jak2 Stat1 Complex
    default: 0.0
    units: native source value
    description: Initial Interferon Receptor Jak2 Stat1 Complex. Sets the initial
      value of bundled SBML species `IFNRJ2_star_STAT1c`.
  outputs:
  - name: interferon_receptor_jak_complex
    maps_to: immunology_sbml_yamada2003_jak_stat_socs1_knockout_biomd0000000094_model.interferon_receptor_jak_complex
  - name: receptor_jak_complex
    maps_to: immunology_sbml_yamada2003_jak_stat_socs1_knockout_biomd0000000094_model.receptor_jak_complex
  - name: ifnrj_dimer
    maps_to: immunology_sbml_yamada2003_jak_stat_socs1_knockout_biomd0000000094_model.ifnrj_dimer
  - name: activated_ifnrj_complex
    maps_to: immunology_sbml_yamada2003_jak_stat_socs1_knockout_biomd0000000094_model.activated_ifnrj_complex
  - name: interferon_receptor_jak2_stat1_complex
    maps_to: immunology_sbml_yamada2003_jak_stat_socs1_knockout_biomd0000000094_model.interferon_receptor_jak2_stat1_complex
  - name: state
    maps_to: immunology_sbml_yamada2003_jak_stat_socs1_knockout_biomd0000000094_model.state
  - name: summary
    maps_to: immunology_sbml_yamada2003_jak_stat_socs1_knockout_biomd0000000094_model.summary
  - name: species_labels
    maps_to: immunology_sbml_yamada2003_jak_stat_socs1_knockout_biomd0000000094_model.species_labels
