schema_version: '2.0'
title: Leber2016 - Host immune response - H.pylori infection
description: The model is first model of tissue level cellular immune responses to
  H. pylori in the publication, 'Modeling the role of lanthionine synthetase C-like
  2 (LANCL2) in the modulation of immune responses.
standard: other
tags:
- immunology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Andrew Leber
- Josep Bassaganya-Riera
- Nuria Tubau-Juni
- Monica Viladomiu
- Vida Abedi
upstream:
  id: biomodels_ebi:MODEL1611160002
  source_db: biomodels_ebi
  source_id: MODEL1611160002
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL1611160002
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL1611160002?filename=MODEL1611160002_url.xml
  license: CC0
biosim:
  entrypoint: src.leber2016_host_immune_response_h_pylori_infectio_model1611160002_model:Leber2016HostImmuneResponseHPyloriInfectioModel1611160002Model
  init_kwargs:
    model_path: data/MODEL1611160002.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
io:
  inputs:
  - name: initial_interferon_gamma
    maps_to: s142
    label: Initial Interferon Gamma
    default: 10000.0
    units: native source value
    description: Initial Interferon Gamma. Sets the initial value of bundled SBML
      species `s142`.
  - name: initial_unresolved_infection_observable_1
    maps_to: s1
    label: Initial Unresolved Infection Observable 1
    default: 100000000.0
    units: native source value
    description: Initial Unresolved Infection Observable 1. Sets the initial value
      of bundled SBML species `s1`.
  - name: initial_hplumdead
    maps_to: s47
    label: Initial Hplumdead
    default: 0.0
    units: native source value
    description: Initial Hplumdead. Sets the initial value of bundled SBML species
      `s47`.
  - name: initial_tolb_signaling_component
    maps_to: s82
    label: Initial Tolb Signaling Component
    default: 0.0
    units: native source value
    description: Initial Tolb Signaling Component. Sets the initial value of bundled
      SBML species `s82`.
  outputs:
  - name: interferon_gamma
    maps_to: s142
    label: Interferon Gamma
    description: Interferon Gamma. Maps to bundled source symbol `s142`.
  - name: unresolved_infection_observable_1
    maps_to: s1
    label: Unresolved Infection Observable 1
    description: Unresolved Infection Observable 1. Maps to bundled source symbol
      `s1`.
  - name: hplumdead
    maps_to: s47
    label: Hplumdead
    description: Hplumdead. Maps to bundled source symbol `s47`.
  - name: tolb_signaling_component
    maps_to: s82
    label: Tolb Signaling Component
    description: Tolb Signaling Component. Maps to bundled source symbol `s82`.
  - name: total_t
    maps_to: Total_T
    label: Total T
    description: Total T. Maps to bundled source symbol `Total_T`.
  - name: state
    description: Full source state record for reproducibility and downstream visualisation.
  - name: summary
    description: Run summary computed from the source model state.
  - name: species_labels
    description: Mapping from source state identifiers to display labels.
