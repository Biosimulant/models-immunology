- Feng Fu
upstream:
  id: biomodels_ebi:BIOMD0000000742
  source_db: biomodels_ebi
  source_id: BIOMD0000000742
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000742
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000742?filename=Garcia2018basic.xml
  license: CC0
biosim:
  entrypoint: src.garcia2018basic_cancer_and_immune_cell_count_bas_biomd0000000742_model:Garcia2018basicCancerAndImmuneCellCountBasBiomd0000000742Model
  init_kwargs:
    model_path: data/BIOMD0000000742.xml
