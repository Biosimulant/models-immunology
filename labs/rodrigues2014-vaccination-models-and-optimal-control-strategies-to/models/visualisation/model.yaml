runtime:
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: immunology_sbml_rodrigues2014_vaccination_models_and_optimal_con_model2003190001_model_state
    maps_to: immunology_sbml_rodrigues2014_vaccination_models_and_optimal_con_model2003190001_model.state
    description: Core state record.
  - name: immunology_sbml_rodrigues2014_vaccination_models_and_optimal_con_model2003190001_model_summary
    maps_to: immunology_sbml_rodrigues2014_vaccination_models_and_optimal_con_model2003190001_model.summary
    description: Core summary record.
  - name: immunology_sbml_rodrigues2014_vaccination_models_and_optimal_con_model2003190001_model_species_labels
    maps_to: immunology_sbml_rodrigues2014_vaccination_models_and_optimal_con_model2003190001_model.species_labels
