schema_version: '2.0'
title: Rodrigues2014-Vaccination models and optimal control strategies to dengue Lab
  Visualisation
description: Dedicated presentation model for Rodrigues2014-Vaccination models and
  optimal control strategies to dengue Lab.
standard: other
tags:
- immunology
- visualisation
authors:
- Biosimulant Team
biosim:
  entrypoint: src.immunology_visualisation:ImmunologyVisualisationModel
