      title: Rodrigues2014-Vaccination models and optimal control strategies to dengue
      visual_scope: Model-state audit
      observables:
      - id: S_h
        label: Unresolved Model Observable 1
      - id: V_h
        label: Unresolved Model Observable 2
      - id: I_h
        label: Unresolved Model Observable 3
      - id: R_h
        label: Unresolved Model Observable 4
      - id: A_m
        label: Unresolved Model Observable 5
      - id: S_m
        label: S_m
