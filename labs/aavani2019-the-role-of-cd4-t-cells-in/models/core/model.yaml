schema_version: '2.0'
title: Aavani2019 - The role of CD4 T cells in immune system activation and viral
  reproduction in a simple model for HIV infection
description: This is a mathematical model comprised of a simple system of four ordinary
  differential equations that account for the two opposing roles of infected and healthy
  cytotoxic T lymphocytes within the con. It can be used to explore immune response
  dynamics and compare pathway-level behavior across conditions.
standard: other
tags:
- immunology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Aavani, P.
- Allen, L.J.S.
upstream:
  id: biomodels_ebi:BIOMD0000000876
  source_db: biomodels_ebi
  source_id: BIOMD0000000876
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000876
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000876?filename=Aavani2019.xml
  license: CC0
biosim:
  entrypoint: src.aavani2019_the_role_of_cd4_t_cells_in_immune_sys_biomd0000000876_model:Aavani2019TheRoleOfCd4TCellsInImmuneSysBiomd0000000876Model
  init_kwargs:
    model_path: data/BIOMD0000000876.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
io:
  inputs:
  - name: initial_uninfected_cd4_t_cells
    maps_to: C_Uninfected_CD4
    label: Initial Uninfected CD4 T Cells
    default: 1000.0
    units: native source value
    description: Initial Uninfected CD4 T Cells. Sets the initial value of bundled
      SBML species `C_Uninfected_CD4`.
  - name: initial_infected_cd4_t_cells
    maps_to: I_Infected_CD4
    label: Initial Infected CD4 T Cells
    default: 1.0
    units: native source value
    description: Initial Infected CD4 T Cells. Sets the initial value of bundled SBML
      species `I_Infected_CD4`.
  - name: initial_virus
    maps_to: V_Virus
    label: Initial Virus
    default: 200.0
    units: native source value
    description: Initial Virus. Sets the initial value of bundled SBML species `V_Virus`.
  - name: initial_cytotoxic_t_lymphocytes
    maps_to: F_CTL
    label: Initial Cytotoxic T Lymphocytes
    default: 1.0
    units: native source value
    description: Initial Cytotoxic T Lymphocytes. Sets the initial value of bundled
      SBML species `F_CTL`.
  - name: cd4_uninfected_infection_rate
    maps_to: beta
    label: CD4 Uninfected Infection Rate
    default: 5.75e-05
    units: native source value
    description: CD4 Uninfected Infection Rate. Sets bundled SBML parameter `beta`.
  outputs:
  - name: uninfected_cd4_t_cells
    maps_to: C_Uninfected_CD4
    label: Uninfected CD4 T Cells
    description: Uninfected CD4 T Cells. Maps to bundled source symbol `C_Uninfected_CD4`.
  - name: infected_cd4_t_cells
    maps_to: I_Infected_CD4
    label: Infected CD4 T Cells
    description: Infected CD4 T Cells. Maps to bundled source symbol `I_Infected_CD4`.
  - name: virus
    maps_to: V_Virus
    label: Virus
    description: Virus. Maps to bundled source symbol `V_Virus`.
  - name: cytotoxic_t_lymphocytes
    maps_to: F_CTL
    label: Cytotoxic T Lymphocytes
    description: Cytotoxic T Lymphocytes. Maps to bundled source symbol `F_CTL`.
  - name: state
    description: Full source state record for reproducibility and downstream visualisation.
  - name: summary
    description: Run summary computed from the source model state.
  - name: species_labels
    description: Mapping from source state identifiers to display labels.
