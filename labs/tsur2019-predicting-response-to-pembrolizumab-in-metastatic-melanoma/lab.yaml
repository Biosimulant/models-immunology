schema_version: '2.0'
title: Tsur2019 - Predicting response to pembrolizumab in metastatic melanoma by a
  new personalization algorithm Lab
description: This is a simple mathematical model describing the interactions of an
  advanced melanoma tumor with both the immune system and the immunotherapy drug,
  pembrolizumab. It can be used to explore immune response dynamics and compare pathway-level
  behavior across conditions.
models:
- alias: immunology_sbml_tsur2019_predicting_response_to_pembrolizumab_in_model1911150001_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: immunology_sbml_tsur2019_predicting_response_to_pembrolizumab_in_model1911150001_model.state
  to:
  - visualisation.immunology_sbml_tsur2019_predicting_response_to_pembrolizumab_in_model1911150001_model_state
- from: immunology_sbml_tsur2019_predicting_response_to_pembrolizumab_in_model1911150001_model.summary
  to:
  - visualisation.immunology_sbml_tsur2019_predicting_response_to_pembrolizumab_in_model1911150001_model_summary
- from: immunology_sbml_tsur2019_predicting_response_to_pembrolizumab_in_model1911150001_model.species_labels
  to:
  - visualisation.immunology_sbml_tsur2019_predicting_response_to_pembrolizumab_in_model1911150001_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
io:
  inputs:
  - name: initial_unresolved_prediction_observable_1
    maps_to: immunology_sbml_tsur2019_predicting_response_to_pembrolizumab_in_model1911150001_model.initial_unresolved_prediction_observable_1
    label: Initial Unresolved Prediction Observable 1
    default: 1.0
    units: native source value
    description: Initial Unresolved Prediction Observable 1. Sets the initial value
      of bundled SBML species `A_pc`.
  - name: initial_unresolved_prediction_observable_2
    maps_to: immunology_sbml_tsur2019_predicting_response_to_pembrolizumab_in_model1911150001_model.initial_unresolved_prediction_observable_2
    label: Initial Unresolved Prediction Observable 2
    default: 1.0
    units: native source value
    description: Initial Unresolved Prediction Observable 2. Sets the initial value
      of bundled SBML species `T_il`.
  - name: initial_unresolved_prediction_observable_3
    maps_to: immunology_sbml_tsur2019_predicting_response_to_pembrolizumab_in_model1911150001_model.initial_unresolved_prediction_observable_3
    label: Initial Unresolved Prediction Observable 3
    default: 50.0
    units: native source value
    description: Initial Unresolved Prediction Observable 3. Sets the initial value
      of bundled SBML species `M_el`.
  outputs:
  - name: unresolved_prediction_observable_1
    maps_to: immunology_sbml_tsur2019_predicting_response_to_pembrolizumab_in_model1911150001_model.unresolved_prediction_observable_1
  - name: unresolved_prediction_observable_2
    maps_to: immunology_sbml_tsur2019_predicting_response_to_pembrolizumab_in_model1911150001_model.unresolved_prediction_observable_2
  - name: unresolved_prediction_observable_3
    maps_to: immunology_sbml_tsur2019_predicting_response_to_pembrolizumab_in_model1911150001_model.unresolved_prediction_observable_3
  - name: state
    maps_to: immunology_sbml_tsur2019_predicting_response_to_pembrolizumab_in_model1911150001_model.state
  - name: summary
    maps_to: immunology_sbml_tsur2019_predicting_response_to_pembrolizumab_in_model1911150001_model.summary
  - name: species_labels
    maps_to: immunology_sbml_tsur2019_predicting_response_to_pembrolizumab_in_model1911150001_model.species_labels
