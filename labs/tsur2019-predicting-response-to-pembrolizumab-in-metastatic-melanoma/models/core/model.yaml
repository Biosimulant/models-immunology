schema_version: '2.0'
title: Tsur2019 - Predicting response to pembrolizumab in metastatic melanoma by a
  new personalization algorithm
description: This is a simple mathematical model describing the interactions of an
  advanced melanoma tumor with both the immune system and the immunotherapy drug,
  pembrolizumab. It can be used to explore immune response dynamics and compare pathway-level
  behavior across conditions.
standard: other
tags:
- immunology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Neta Tsur
- Yuri Kogan
- Evgenia Avizov-Khodak
- "D\xE9sir\xE9e Vaeth"
- Nils Vogler
upstream:
  id: biomodels_ebi:MODEL1911150001
  source_db: biomodels_ebi
  source_id: MODEL1911150001
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL1911150001
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL1911150001?filename=Tsur2019.xml
  license: CC0
biosim:
  entrypoint: src.tsur2019_predicting_response_to_pembrolizumab_in_model1911150001_model:Tsur2019PredictingResponseToPembrolizumabInModel1911150001Model
  init_kwargs:
    model_path: data/MODEL1911150001.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
io:
  inputs:
  - name: initial_unresolved_prediction_observable_1
    maps_to: A_pc
    label: Initial Unresolved Prediction Observable 1
    default: 1.0
    units: native source value
    description: Initial Unresolved Prediction Observable 1. Sets the initial value
      of bundled SBML species `A_pc`.
  - name: initial_unresolved_prediction_observable_2
    maps_to: T_il
    label: Initial Unresolved Prediction Observable 2
    default: 1.0
    units: native source value
    description: Initial Unresolved Prediction Observable 2. Sets the initial value
      of bundled SBML species `T_il`.
  - name: initial_unresolved_prediction_observable_3
    maps_to: M_el
    label: Initial Unresolved Prediction Observable 3
    default: 50.0
    units: native source value
    description: Initial Unresolved Prediction Observable 3. Sets the initial value
      of bundled SBML species `M_el`.
  outputs:
  - name: unresolved_prediction_observable_1
    maps_to: A_pc
    label: Unresolved Prediction Observable 1
    description: Unresolved Prediction Observable 1. Maps to bundled source symbol
      `A_pc`.
  - name: unresolved_prediction_observable_2
    maps_to: T_il
    label: Unresolved Prediction Observable 2
    description: Unresolved Prediction Observable 2. Maps to bundled source symbol
      `T_il`.
  - name: unresolved_prediction_observable_3
    maps_to: M_el
    label: Unresolved Prediction Observable 3
    description: Unresolved Prediction Observable 3. Maps to bundled source symbol
      `M_el`.
  - name: state
    description: Full source state record for reproducibility and downstream visualisation.
  - name: summary
    description: Run summary computed from the source model state.
  - name: species_labels
    description: Mapping from source state identifiers to display labels.
