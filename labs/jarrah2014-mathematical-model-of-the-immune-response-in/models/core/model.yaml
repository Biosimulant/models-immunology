    units: substance
    description: Initial CD4 T Helper Cells H. Sets the initial value of bundled SBML
      species `H`.
  - name: initial_macrophages_m
    maps_to: M
    label: Initial Macrophages M
    default: 400.0
    units: substance
    description: Initial Macrophages M. Sets the initial value of bundled SBML species
      `M`.
  - name: initial_cd8_cytotoxic_t_lymphocytes_c
    maps_to: C
    label: Initial CD8 Cytotoxic T Lymphocytes C
    default: 4.0
    units: substance
    description: Initial CD8 Cytotoxic T Lymphocytes C. Sets the initial value of
      bundled SBML species `C`.
  - name: initial_damaged_fibres_d
    maps_to: D
    label: Initial Damaged Fibres D
    default: 0.0
    units: substance
    description: Initial Damaged Fibres D. Sets the initial value of bundled SBML
      species `D`.
  - name: initial_normal_fibres_n
    maps_to: N
    label: Initial Normal Fibres N
    default: 100.0
    units: substance
    description: Initial Normal Fibres N. Sets the initial value of bundled SBML species
      `N`.
  outputs:
  - name: cd4_t_helper_cells_h
    maps_to: H
    label: CD4 T Helper Cells H
    description: CD4 T Helper Cells H. Maps to bundled source symbol `H`.
  - name: macrophages_m
    maps_to: M
    label: Macrophages M
    description: Macrophages M. Maps to bundled source symbol `M`.
  - name: cd8_cytotoxic_t_lymphocytes_c
    maps_to: C
    label: CD8 Cytotoxic T Lymphocytes C
    description: CD8 Cytotoxic T Lymphocytes C. Maps to bundled source symbol `C`.
  - name: damaged_fibres_d
    maps_to: D
    label: Damaged Fibres D
    description: Damaged Fibres D. Maps to bundled source symbol `D`.
  - name: normal_fibres_n
    maps_to: N
    label: Normal Fibres N
    description: Normal Fibres N. Maps to bundled source symbol `N`.
  - name: state
    description: Full source state record for reproducibility and downstream visualisation.
  - name: summary
    description: Run summary computed from the source model state.
  - name: species_labels
    description: Mapping from source state identifiers to display labels.
