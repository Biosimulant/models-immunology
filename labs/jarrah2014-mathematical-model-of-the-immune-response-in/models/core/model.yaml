schema_version: '2.0'
title: Jarrah2014 - mathematical model of the immune response in muscle degeneration
  and subsequent regeneration in Duchenne muscular dystrophy in mdx mice
description: Duchenne muscular dystrophy (DMD) is a genetic disease that results in
  the death of affected boys by early adulthood.The genetic defect responsible for
  DMD has been known for over 25 years, yet at pre. It can be used to explore immune
  response dynamics and compare pathway-level behavior across conditions.
standard: other
tags:
- immunology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Abdul Salam Jarrah
- Filippo Castiglione
- Nicholas P Evans
- Robert W Grange
- Reinhard Laubenbacher
upstream:
  id: biomodels_ebi:BIOMD0000001015
  source_db: biomodels_ebi
  source_id: BIOMD0000001015
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000001015
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000001015?filename=Jarrah2014.xml
  license: CC0
biosim:
  entrypoint: src.jarrah2014_mathematical_model_of_the_immune_resp_biomd0000001015_model:Jarrah2014MathematicalModelOfTheImmuneRespBiomd0000001015Model
  init_kwargs:
    model_path: data/BIOMD0000001015.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
io:
