schema_version: '2.0'
title: Overgaard2007_PDmodel_IL21
description: 'This a model from the article: PKPD model of interleukin-21 effects
  on thermoregulation in monkeys--application and evaluation of stochastic differential
  equations. It can be used to explore immune response dynamics and compare pathway-level
  behavior across conditions.'
standard: other
tags:
- immunology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Rune Viig Overgaard
- Nick Holford
- Klaus A Rytved
- Henrik Madsen
upstream:
  id: biomodels_ebi:BIOMD0000000238
  source_db: biomodels_ebi
  source_id: BIOMD0000000238
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000238
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000238?filename=BIOMD0000000238_url.xml
  license: CC0
biosim:
  entrypoint: src.overgaard2007_pdmodel_il21_biomd0000000238_model:Overgaard2007PdmodelIl21Biomd0000000238Model
  init_kwargs:
    model_path: data/BIOMD0000000238.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
io:
  inputs:
  - name: rate_constant_metabolism_parameter
    maps_to: km
    label: Rate Constant Metabolism Parameter
    default: 1.1375
    units: native source value
    description: Rate Constant Metabolism Parameter. Sets bundled SBML parameter `km`.
  - name: amt_dose
    maps_to: AMT_dose
    label: Amt Dose
    default: 3.0
    units: native source value
    description: Amt Dose. Sets bundled SBML parameter `AMT_dose`.
  - name: delta_high_dose
    maps_to: delta_high_dose
    label: Delta High Dose
    default: 1.0
    units: native source value
    description: Delta High Dose. Sets bundled SBML parameter `delta_high_dose`.
  outputs:
  - name: metabolic_rate
    maps_to: M
    label: Metabolic Rate
    description: Metabolic Rate. Maps to bundled source symbol `M`.
  - name: temperature
    maps_to: T
    label: Temperature
    description: Temperature. Maps to bundled source symbol `T`.
  - name: bound_receptor
    maps_to: BR
    label: Bound Receptor
    description: Bound Receptor. Maps to bundled source symbol `BR`.
  - name: state
    description: Full source state record for reproducibility and downstream visualisation.
  - name: summary
    description: Run summary computed from the source model state.
  - name: species_labels
    description: Mapping from source state identifiers to display labels.
