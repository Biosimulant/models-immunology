  - name: initial_unresolved_tumor_observable_2
    maps_to: P_PSC
    label: Initial Unresolved Tumor Observable 2
    default: 5600000.0
    units: native source value
    description: Initial Unresolved Tumor Observable 2. Sets the initial value of
      bundled SBML species `P_PSC`.
  - name: initial_cd8
    maps_to: E_CD8
    label: Initial CD8
    default: 873600000.0
    units: native source value
    description: Initial CD8. Sets the initial value of bundled SBML species `E_CD8`.
  - name: initial_killer
    maps_to: N_Killer
    label: Initial Killer
    default: 481600000.0
    units: native source value
    description: Initial Killer. Sets the initial value of bundled SBML species `N_Killer`.
  - name: initial_t_helper
    maps_to: H_T_Helper
    label: Initial T Helper
    default: 2116800000.0
    units: native source value
