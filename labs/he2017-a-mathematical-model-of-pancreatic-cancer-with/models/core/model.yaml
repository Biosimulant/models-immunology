    description: Unresolved Tumor Observable 1. Maps to bundled source symbol `C_PCC`.
  - name: unresolved_tumor_observable_2
    maps_to: P_PSC
    label: Unresolved Tumor Observable 2
    description: Unresolved Tumor Observable 2. Maps to bundled source symbol `P_PSC`.
  - name: cd8
