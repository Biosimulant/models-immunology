    maps_to: immunology_sbml_he2017_a_mathematical_model_of_pancreatic_cancer_biomd0000000811_model.initial_unresolved_tumor_observable_1
    label: Initial Unresolved Tumor Observable 1
    default: 1000000000.0
    units: native source value
    description: Initial Unresolved Tumor Observable 1. Sets the initial value of
      bundled SBML species `C_PCC`.
  - name: initial_unresolved_tumor_observable_2
    maps_to: immunology_sbml_he2017_a_mathematical_model_of_pancreatic_cancer_biomd0000000811_model.initial_unresolved_tumor_observable_2
