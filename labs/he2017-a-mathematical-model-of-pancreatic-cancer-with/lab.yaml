schema_version: '2.0'
title: He2017 - A mathematical model of pancreatic cancer with two kinds of treatments
  Lab
description: This is a mathematical model of pancreatic cancer which includes descriptions
  of regulatory T cell activity and inhibition therapy. Descriptions of cytokine induced
  killer immunotherapy are also inclu.
models:
- alias: immunology_sbml_he2017_a_mathematical_model_of_pancreatic_cancer_biomd0000000811_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
