  to:
  - visualisation.immunology_sbml_he2017_a_mathematical_model_of_pancreatic_cancer_biomd0000000811_model_state
- from: immunology_sbml_he2017_a_mathematical_model_of_pancreatic_cancer_biomd0000000811_model.summary
  to:
  - visualisation.immunology_sbml_he2017_a_mathematical_model_of_pancreatic_cancer_biomd0000000811_model_summary
- from: immunology_sbml_he2017_a_mathematical_model_of_pancreatic_cancer_biomd0000000811_model.species_labels
  to:
  - visualisation.immunology_sbml_he2017_a_mathematical_model_of_pancreatic_cancer_biomd0000000811_model_species_labels
runtime:
