    default: 5600000.0
    units: native source value
    description: Initial Unresolved Tumor Observable 2. Sets the initial value of
      bundled SBML species `P_PSC`.
  - name: initial_cd8
    maps_to: immunology_sbml_he2017_a_mathematical_model_of_pancreatic_cancer_biomd0000000811_model.initial_cd8
    label: Initial CD8
    default: 873600000.0
    units: native source value
    description: Initial CD8. Sets the initial value of bundled SBML species `E_CD8`.
  - name: initial_killer
    maps_to: immunology_sbml_he2017_a_mathematical_model_of_pancreatic_cancer_biomd0000000811_model.initial_killer
    label: Initial Killer
