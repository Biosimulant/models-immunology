schema_version: '2.0'
title: Anderson2015 - Qualitative behavior of systems of tumor-CD4+-cytokine interactions
  with treatments
description: This is a mathematical model describing tumor-CD4+-cytokine interactions,
  with specific emphasis on the role that CD4+ T lymphocytes play in tumor regression.
  It can be used to explore immune response dynamics and compare pathway-level behavior
  across conditions.
standard: other
tags:
- immunology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Anderson, L.
- Jang, S.
- Yu, J.-L.
upstream:
  id: biomodels_ebi:BIOMD0000000813
  source_db: biomodels_ebi
  source_id: BIOMD0000000813
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000813
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000813?filename=Anderson2015.xml
  license: CC0
biosim:
  entrypoint: src.anderson2015_qualitative_behavior_of_systems_of_biomd0000000813_model:Anderson2015QualitativeBehaviorOfSystemsOfBiomd0000000813Model
  init_kwargs:
    model_path: data/BIOMD0000000813.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
io:
  inputs:
  - name: initial_tumor_cells
    maps_to: x_Tumor_Cells
    label: Initial Tumor Cells
    default: 0.5
    units: native source value
    description: Initial Tumor Cells. Sets the initial value of bundled SBML species
      `x_Tumor_Cells`.
  - name: initial_cd4_t_cells
    maps_to: y_CD4_T_Cells
    label: Initial CD4 T Cells
    default: 0.01
    units: native source value
    description: Initial CD4 T Cells. Sets the initial value of bundled SBML species
      `y_CD4_T_Cells`.
  - name: initial_cytokine
    maps_to: z_Cytokine
    label: Initial Cytokine
    default: 0.0
    units: native source value
    description: Initial Cytokine. Sets the initial value of bundled SBML species
      `z_Cytokine`.
  - name: tumor_growth_rate
    maps_to: r
    label: Tumor Growth Rate
    default: 0.03
    units: native source value
    description: Tumor Growth Rate. Sets bundled SBML parameter `r`.
  - name: tumor_killing_rate
    maps_to: delta
    label: Tumor Killing Rate
    default: 0.1
    units: native source value
    description: Tumor Killing Rate. Sets bundled SBML parameter `delta`.
  outputs:
  - name: tumor_cells
    maps_to: x_Tumor_Cells
    label: Tumor Cells
    description: Tumor Cells. Maps to bundled source symbol `x_Tumor_Cells`.
  - name: cd4_t_cells
    maps_to: y_CD4_T_Cells
    label: CD4 T Cells
    description: CD4 T Cells. Maps to bundled source symbol `y_CD4_T_Cells`.
  - name: cytokine
    maps_to: z_Cytokine
    label: Cytokine
    description: Cytokine. Maps to bundled source symbol `z_Cytokine`.
  - name: state
    description: Full source state record for reproducibility and downstream visualisation.
  - name: summary
    description: Run summary computed from the source model state.
  - name: species_labels
    description: Mapping from source state identifiers to display labels.
