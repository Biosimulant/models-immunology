title: Ewald2021 - Innate immune response during invasive aspergillosis by dynamic
  optimization
description: Aspergillus fumigatus is an important human fungal pathogen and its conidia
  are constantly inhaled by humans. In immunocompromised individuals, conidia can
  grow out as hyphae that damage lung epitheli.
