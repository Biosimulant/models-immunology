schema_version: '2.0'
title: Hu2018 - Dynamics of tumor-CD4+-cytokine-host cells interactions with treatments
description: This is a proposed mathematical model describing interactions between
  tumor cells, CD4+ T cells, cytokines, and host cells within the context of CD4+
  T cells inducing tumor regression. It can be used to explore immune response dynamics
  and compare pathway-level behavior across conditions.
standard: other
tags:
- immunology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Hu, X.
- Jang, S.R.-J.
upstream:
  id: biomodels_ebi:BIOMD0000000797
  source_db: biomodels_ebi
  source_id: BIOMD0000000797
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000797
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000797?filename=Hu2018.xml
  license: CC0
biosim:
  entrypoint: src.hu2018_dynamics_of_tumor_cd4_cytokine_host_cells_biomd0000000797_model:Hu2018DynamicsOfTumorCd4CytokineHostCellsBiomd0000000797Model
  init_kwargs:
    model_path: data/BIOMD0000000797.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
io:
  inputs:
  - name: initial_tumor_cells
    maps_to: x_Tumor_Cells
    label: Initial Tumor Cells
    default: 67700.0
    units: native source value
    description: Initial Tumor Cells. Sets the initial value of bundled SBML species
      `x_Tumor_Cells`.
  - name: initial_cd4_t_cells
    maps_to: y_CD4_T_Cells
    label: Initial CD4 T Cells
    default: 1000000.0
    units: native source value
    description: Initial CD4 T Cells. Sets the initial value of bundled SBML species
      `y_CD4_T_Cells`.
  - name: initial_cytokine
    maps_to: z_Cytokine
    label: Initial Cytokine
    default: 100000.0
    units: native source value
    description: Initial Cytokine. Sets the initial value of bundled SBML species
      `z_Cytokine`.
  - name: initial_healthy_tissue
    maps_to: w_Healthy_Tissue
    label: Initial Healthy Tissue
    default: 1000000000.0
    units: native source value
    description: Initial Healthy Tissue. Sets the initial value of bundled SBML species
      `w_Healthy_Tissue`.
  - name: tumor_growth_rate
    maps_to: r_1
    label: Tumor Growth Rate
    default: 0.514
    units: native source value
    description: Tumor Growth Rate. Sets bundled SBML parameter `r_1`.
  - name: tumor_killing_cytokine_rate
    maps_to: c_1
    label: Tumor Killing Cytokine Rate
    default: 0.2
    units: native source value
    description: Tumor Killing Cytokine Rate. Sets bundled SBML parameter `c_1`.
  - name: cd4t_natural_death_rate
    maps_to: mu_1
    label: Cd4t Natural Death Rate
    default: 0.1
    units: native source value
    description: Cd4t Natural Death Rate. Sets bundled SBML parameter `mu_1`.
  - name: cytokine_decay_rate
    maps_to: mu_2
    label: Cytokine Decay Rate
    default: 34.0
    units: native source value
    description: Cytokine Decay Rate. Sets bundled SBML parameter `mu_2`.
  - name: normal_tissue_growth_rate
    maps_to: r_2
    label: Normal Tissue Growth Rate
    default: 0.2822
    units: native source value
    description: Normal Tissue Growth Rate. Sets bundled SBML parameter `r_2`.
  outputs:
  - name: tumor_cells
    maps_to: x_Tumor_Cells
    label: Tumor Cells
    description: Tumor Cells. Maps to bundled source symbol `x_Tumor_Cells`.
  - name: cd4_t_cells
    maps_to: y_CD4_T_Cells
    label: CD4 T Cells
    description: CD4 T Cells. Maps to bundled source symbol `y_CD4_T_Cells`.
  - name: cytokine
    maps_to: z_Cytokine
    label: Cytokine
    description: Cytokine. Maps to bundled source symbol `z_Cytokine`.
  - name: healthy_tissue
    maps_to: w_Healthy_Tissue
    label: Healthy Tissue
    description: Healthy Tissue. Maps to bundled source symbol `w_Healthy_Tissue`.
  - name: state
    description: Full source state record for reproducibility and downstream visualisation.
  - name: summary
    description: Run summary computed from the source model state.
  - name: species_labels
    description: Mapping from source state identifiers to display labels.
