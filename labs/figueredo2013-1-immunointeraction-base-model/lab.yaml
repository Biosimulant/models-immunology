schema_version: '2.0'
title: Figueredo2013/1 - immunointeraction base model Lab
description: 'The paper describes a basic model of immune-itumor interaction.Created
  by COPASI 4.25 (Build 207) This model is described in the article: Investigating
  mathematical models of immuno-interactions with. It can be used to explore immune
  response dynamics and compare pathway-level behavior across conditions.'
models:
- alias: immunology_sbml_figueredo2013_1_immunointeraction_base_model_biomd0000000753_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: immunology_sbml_figueredo2013_1_immunointeraction_base_model_biomd0000000753_model.state
  to:
  - visualisation.immunology_sbml_figueredo2013_1_immunointeraction_base_model_biomd0000000753_model_state
- from: immunology_sbml_figueredo2013_1_immunointeraction_base_model_biomd0000000753_model.summary
  to:
  - visualisation.immunology_sbml_figueredo2013_1_immunointeraction_base_model_biomd0000000753_model_summary
- from: immunology_sbml_figueredo2013_1_immunointeraction_base_model_biomd0000000753_model.species_labels
  to:
  - visualisation.immunology_sbml_figueredo2013_1_immunointeraction_base_model_biomd0000000753_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
io:
  inputs:
  - name: initial_unresolved_tumor_observable_1
    maps_to: immunology_sbml_figueredo2013_1_immunointeraction_base_model_biomd0000000753_model.initial_unresolved_tumor_observable_1
    label: Initial Unresolved Tumor Observable 1
    default: 50.0
    units: substance
    description: Initial Unresolved Tumor Observable 1. Sets the initial value of
      bundled SBML species `T`.
  - name: initial_unresolved_tumor_observable_2
    maps_to: immunology_sbml_figueredo2013_1_immunointeraction_base_model_biomd0000000753_model.initial_unresolved_tumor_observable_2
    label: Initial Unresolved Tumor Observable 2
    default: 5.0
    units: substance
    description: Initial Unresolved Tumor Observable 2. Sets the initial value of
      bundled SBML species `E`.
  - name: immune_death_rate
    maps_to: immunology_sbml_figueredo2013_1_immunointeraction_base_model_biomd0000000753_model.immune_death_rate
    label: Immune Death Rate
    default: 2.0
    units: unit_0
    description: Immune Death Rate. Sets bundled SBML parameter `d`.
  outputs:
  - name: unresolved_tumor_observable_1
    maps_to: immunology_sbml_figueredo2013_1_immunointeraction_base_model_biomd0000000753_model.unresolved_tumor_observable_1
  - name: unresolved_tumor_observable_2
    maps_to: immunology_sbml_figueredo2013_1_immunointeraction_base_model_biomd0000000753_model.unresolved_tumor_observable_2
  - name: state
    maps_to: immunology_sbml_figueredo2013_1_immunointeraction_base_model_biomd0000000753_model.state
  - name: summary
    maps_to: immunology_sbml_figueredo2013_1_immunointeraction_base_model_biomd0000000753_model.summary
  - name: species_labels
    maps_to: immunology_sbml_figueredo2013_1_immunointeraction_base_model_biomd0000000753_model.species_labels
