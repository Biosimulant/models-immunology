schema_version: '2.0'
title: "Gei\xDFert2020 - Yersinia enterocolitica co-infection in mice Lab"
description: This model simulates the colonization of the mouse gut with different
  strains of Yersinia enterocolitica. Thereby it takes the host-immune repsone into
  account.
models:
- alias: immunology_sbml_gei_ert2020_yersinia_enterocolitica_co_infection_model2002070001_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: immunology_sbml_gei_ert2020_yersinia_enterocolitica_co_infection_model2002070001_model.state
  to:
  - visualisation.immunology_sbml_gei_ert2020_yersinia_enterocolitica_co_infection_model2002070001_model_state
- from: immunology_sbml_gei_ert2020_yersinia_enterocolitica_co_infection_model2002070001_model.summary
  to:
  - visualisation.immunology_sbml_gei_ert2020_yersinia_enterocolitica_co_infection_model2002070001_model_summary
- from: immunology_sbml_gei_ert2020_yersinia_enterocolitica_co_infection_model2002070001_model.species_labels
  to:
  - visualisation.immunology_sbml_gei_ert2020_yersinia_enterocolitica_co_infection_model2002070001_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
io:
  inputs:
  - name: initial_wild_type_yersinia_enterocolitica_in_mucosa
    maps_to: immunology_sbml_gei_ert2020_yersinia_enterocolitica_co_infection_model2002070001_model.initial_wild_type_yersinia_enterocolitica_in_mucosa
    label: Initial Wild Type Yersinia Enterocolitica In Mucosa
    default: 10.0
    units: item
    description: Initial Wild Type Yersinia Enterocolitica In Mucosa. Sets the initial
      value of bundled SBML species `x2`.
  - name: initial_wild_type_yersinia_enterocolitica_in_lumen
    maps_to: immunology_sbml_gei_ert2020_yersinia_enterocolitica_co_infection_model2002070001_model.initial_wild_type_yersinia_enterocolitica_in_lumen
    label: Initial Wild Type Yersinia Enterocolitica In Lumen
    default: 1000.0
    units: item
    description: Initial Wild Type Yersinia Enterocolitica In Lumen. Sets the initial
      value of bundled SBML species `x5`.
  outputs:
  - name: commensal_bacteria_in_mucosa
    maps_to: immunology_sbml_gei_ert2020_yersinia_enterocolitica_co_infection_model2002070001_model.commensal_bacteria_in_mucosa
  - name: commensal_bacteria_in_lumen
    maps_to: immunology_sbml_gei_ert2020_yersinia_enterocolitica_co_infection_model2002070001_model.commensal_bacteria_in_lumen
  - name: wild_type_yersinia_enterocolitica_in_mucosa
    maps_to: immunology_sbml_gei_ert2020_yersinia_enterocolitica_co_infection_model2002070001_model.wild_type_yersinia_enterocolitica_in_mucosa
  - name: mutant_yersinia_enterocolitica_in_mucosa
    maps_to: immunology_sbml_gei_ert2020_yersinia_enterocolitica_co_infection_model2002070001_model.mutant_yersinia_enterocolitica_in_mucosa
  - name: wild_type_yersinia_enterocolitica_in_lumen
    maps_to: immunology_sbml_gei_ert2020_yersinia_enterocolitica_co_infection_model2002070001_model.wild_type_yersinia_enterocolitica_in_lumen
  - name: state
    maps_to: immunology_sbml_gei_ert2020_yersinia_enterocolitica_co_infection_model2002070001_model.state
  - name: summary
    maps_to: immunology_sbml_gei_ert2020_yersinia_enterocolitica_co_infection_model2002070001_model.summary
  - name: species_labels
    maps_to: immunology_sbml_gei_ert2020_yersinia_enterocolitica_co_infection_model2002070001_model.species_labels
