schema_version: '2.0'
title: "Gei\xDFert2020 - Yersinia enterocolitica co-infection in mice"
description: This model simulates the colonization of the mouse gut with different
  strains of Yersinia enterocolitica. Thereby it takes the host-immune repsone into
  account.
standard: other
tags:
- immunology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- "Janina K. Gei\xDFert"
- Erwin Bohn
- Reihaneh Mostolizadeh
- "Andreas Dr\xE4ger"
- Ingo B. Autenrieth
upstream:
  id: biomodels_ebi:MODEL2002070001
  source_db: biomodels_ebi
  source_id: MODEL2002070001
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL2002070001
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL2002070001?filename=yersinia_population_model.xml
  license: CC0
biosim:
  entrypoint: src.gei_ert2020_yersinia_enterocolitica_co_infection_model2002070001_model:GeiErt2020YersiniaEnterocoliticaCoInfectionModel2002070001Model
  init_kwargs:
    model_path: data/MODEL2002070001.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
io:
  inputs:
  - name: initial_wild_type_yersinia_enterocolitica_in_mucosa
    maps_to: x2
    label: Initial Wild Type Yersinia Enterocolitica In Mucosa
    default: 10.0
    units: item
    description: Initial Wild Type Yersinia Enterocolitica In Mucosa. Sets the initial
      value of bundled SBML species `x2`.
  - name: initial_wild_type_yersinia_enterocolitica_in_lumen
    maps_to: x5
    label: Initial Wild Type Yersinia Enterocolitica In Lumen
    default: 1000.0
    units: item
    description: Initial Wild Type Yersinia Enterocolitica In Lumen. Sets the initial
      value of bundled SBML species `x5`.
  outputs:
  - name: commensal_bacteria_in_mucosa
    maps_to: x1
    label: Commensal Bacteria In Mucosa
    description: Commensal Bacteria In Mucosa. Maps to bundled source symbol `x1`.
  - name: commensal_bacteria_in_lumen
    maps_to: x4
    label: Commensal Bacteria In Lumen
    description: Commensal Bacteria In Lumen. Maps to bundled source symbol `x4`.
  - name: wild_type_yersinia_enterocolitica_in_mucosa
    maps_to: x2
    label: Wild Type Yersinia Enterocolitica In Mucosa
    description: Wild Type Yersinia Enterocolitica In Mucosa. Maps to bundled source
      symbol `x2`.
  - name: mutant_yersinia_enterocolitica_in_mucosa
    maps_to: x3
    label: Mutant Yersinia Enterocolitica In Mucosa
    description: Mutant Yersinia Enterocolitica In Mucosa. Maps to bundled source
      symbol `x3`.
  - name: wild_type_yersinia_enterocolitica_in_lumen
    maps_to: x5
    label: Wild Type Yersinia Enterocolitica In Lumen
    description: Wild Type Yersinia Enterocolitica In Lumen. Maps to bundled source
      symbol `x5`.
  - name: state
    description: Full source state record for reproducibility and downstream visualisation.
  - name: summary
    description: Run summary computed from the source model state.
  - name: species_labels
    description: Mapping from source state identifiers to display labels.
