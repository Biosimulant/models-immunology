schema_version: '2.0'
title: Bachmann2011 - Division of labor by dual feedback regulators controls JAK2/STAT5
  signaling over broad ligand range
description: This is a dynamic pathway model examining the roles of of the two transcriptional
  negative feedback regulators of the suppressor of cytokine signaling (SOCS) family,
  CIS and SOCS3, in JAK/STAT5 signal. It can be used to explore immune response dynamics
  and compare pathway-level behavior across conditions.
