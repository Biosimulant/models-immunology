schema_version: '2.0'
title: Hanson2016 - Toxicity Management in CAR T cell therapy for B-ALL
description: This model provides an in silico mathematical platform to explore the
  interactions between chimeric antigen receptor-modified T cells, inflammatory toxicitiy,
  and the tumour burdens of individual pati. It can be used to explore immune response
  dynamics and compare pathway-level behavior across conditions.
