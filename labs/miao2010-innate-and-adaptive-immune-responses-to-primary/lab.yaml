schema_version: '2.0'
title: Miao2010 - Innate and adaptive immune responses to primary Influenza A Virus
  infection 1 1 Lab
description: 'Miao2010 - Innate and adaptive immuneresponses to primary Influenza
  A Virus infection This model is described in the article: Quantifying the early
  immune response and adaptive immune response kinetic. It can be used to explore
  immune response dynamics and compare pathway-level behavior across conditions.'
