  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000546
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000546?filename=BIOMD0000000546.xml
  license: CC0
biosim:
  entrypoint: src.miao2010_innate_and_adaptive_immune_responses_to_biomd0000000546_model:Miao2010InnateAndAdaptiveImmuneResponsesToBiomd0000000546Model
  init_kwargs:
