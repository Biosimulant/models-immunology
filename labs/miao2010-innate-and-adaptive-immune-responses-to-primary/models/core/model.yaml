      of bundled SBML species `s2`.
  - name: initial_unresolved_infection_observable_3
    maps_to: s3
    label: Initial Unresolved Infection Observable 3
    default: 1000.0
    units: substance
    description: Initial Unresolved Infection Observable 3. Sets the initial value
      of bundled SBML species `s3`.
  outputs:
  - name: unresolved_infection_observable_1
    maps_to: s1
    label: Unresolved Infection Observable 1
    description: Unresolved Infection Observable 1. Maps to bundled source symbol
      `s1`.
  - name: unresolved_infection_observable_2
    maps_to: s2
    label: Unresolved Infection Observable 2
    description: Unresolved Infection Observable 2. Maps to bundled source symbol
