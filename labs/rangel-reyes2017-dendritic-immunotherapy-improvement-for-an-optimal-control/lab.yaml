schema_version: '2.0'
title: Rangel-Reyes2017 - Dendritic Immunotherapy Improvement for an Optimal Control
  Murine Model Lab
description: This is a mathematical model provides a platform for investigating the
  efficacy of dendritic cell vaccines during cancer treatment while accounting for
  obstacles such as immunosuppression and poor tra. It can be used to explore immune
  response dynamics and compare pathway-level behavior across conditions.
