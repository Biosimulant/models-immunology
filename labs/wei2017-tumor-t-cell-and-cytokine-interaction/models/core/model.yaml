    default: 0.1
    units: unit_0
    description: Immune Cell Growth Rate. Sets bundled SBML parameter `beta`.
  - name: immune_cell_growth_rate_2
    maps_to: k
    label: Immune Cell Growth Rate 2
    default: 1000.0
    units: unit_1
    description: Immune Cell Growth Rate 2. Sets bundled SBML parameter `k`.
