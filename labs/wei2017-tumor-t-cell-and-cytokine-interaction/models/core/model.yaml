      bundled SBML species `I`.
  - name: initial_unresolved_tumor_observable_3
    maps_to: C
    label: Initial Unresolved Tumor Observable 3
    default: 0.0
    units: substance
    description: Initial Unresolved Tumor Observable 3. Sets the initial value of
      bundled SBML species `C`.
  - name: tumor_growth_rate
    maps_to: r
    label: Tumor Growth Rate
    default: 0.01
    units: unit_0
    description: Tumor Growth Rate. Sets bundled SBML parameter `r`.
  - name: tumor_killing_rate
    maps_to: d
    label: Tumor Killing Rate
    default: 0.1
    units: unit_0
    description: Tumor Killing Rate. Sets bundled SBML parameter `d`.
  - name: immune_cell_growth_rate
