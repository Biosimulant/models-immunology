- from: immunology_sbml_louzoun2014_a_mathematical_model_for_pancreatic_model1909100002_model.species_labels
  to:
  - visualisation.immunology_sbml_louzoun2014_a_mathematical_model_for_pancreatic_model1909100002_model_species_labels
