schema_version: '2.0'
title: Nikolopoulou2018 - Tumour-immune dynamics with an immune checkpoint inhibitor
  Lab
description: This is a mathematical model investigating the effects of continuous
  and intermittent PD-L1 and anti-PD-L1 therapy upon tumor-immune dynamics. It can
  be used to explore immune response dynamics and compare pathway-level behavior across
  conditions.
