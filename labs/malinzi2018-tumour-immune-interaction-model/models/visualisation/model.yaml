schema_version: '2.0'
title: Malinzi2018 - tumour-immune interaction model Lab Visualisation
description: Dedicated presentation model for Malinzi2018 - tumour-immune interaction
  model Lab.
standard: other
tags:
- immunology
- visualisation
authors:
- Biosimulant Team
biosim:
  entrypoint: src.immunology_visualisation:ImmunologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Malinzi2018 - tumour-immune interaction model Lab
    question: Does the modeled immune module restrain tumor burden or amplify treatment-relevant
      activity?
    answer_focus: tumor burden, immune effector activity, treatment terms, and largest
      state excursions
    context: tumor_immunology
    sources:
    - alias: immunology_sbml_malinzi2018_tumour_immune_interaction_model_biomd0000000809_model
      title: Malinzi2018 - tumour-immune interaction model
      visual_scope: Tumor-immune burden
      observables:
      - id: x
        label: Immune Cell X
      - id: y
        label: Tumour Cell Y
      - id: ystar
        label: Dead Tumour Cell Ystar
      - id: u
        label: Chemokine Concentration U
  communication_step: 1.0
runtime:
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: immunology_sbml_malinzi2018_tumour_immune_interaction_model_biomd0000000809_model_state
    maps_to: immunology_sbml_malinzi2018_tumour_immune_interaction_model_biomd0000000809_model.state
    description: Core state record.
  - name: immunology_sbml_malinzi2018_tumour_immune_interaction_model_biomd0000000809_model_summary
    maps_to: immunology_sbml_malinzi2018_tumour_immune_interaction_model_biomd0000000809_model.summary
    description: Core summary record.
  - name: immunology_sbml_malinzi2018_tumour_immune_interaction_model_biomd0000000809_model_species_labels
    maps_to: immunology_sbml_malinzi2018_tumour_immune_interaction_model_biomd0000000809_model.species_labels
    description: Core source-label map.
  outputs: []
