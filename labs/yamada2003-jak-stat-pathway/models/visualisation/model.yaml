    - PyYAML==6.0.3
io:
  inputs:
  - name: immunology_sbml_yamada2003_jak_stat_pathway_biomd0000000093_model_state
    maps_to: immunology_sbml_yamada2003_jak_stat_pathway_biomd0000000093_model.state
    description: Core state record.
  - name: immunology_sbml_yamada2003_jak_stat_pathway_biomd0000000093_model_summary
    maps_to: immunology_sbml_yamada2003_jak_stat_pathway_biomd0000000093_model.summary
    description: Core summary record.
  - name: immunology_sbml_yamada2003_jak_stat_pathway_biomd0000000093_model_species_labels
