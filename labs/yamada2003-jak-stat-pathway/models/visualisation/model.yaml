      - id: RJ
        label: Receptor JAK Complex
      - id: IFNRJ2
        label: Ifnrj Dimer
      - id: IFNRJ2_star
        label: Activated Ifnrj Complex
      - id: IFNRJ2_star_STAT1c
        label: Interferon Receptor Jak2 Stat1 Complex
      - id: IFNRJ2_star_STAT1c_star
        label: IFNRJ2_star_STAT1c_star
