schema_version: '2.0'
title: Alharbi2020 - Tumor and immune system competition Lab Visualisation
description: Dedicated presentation model for Alharbi2020 - Tumor and immune system
  competition Lab.
standard: other
tags:
- immunology
- visualisation
authors:
- Biosimulant Team
biosim:
  entrypoint: src.immunology_visualisation:ImmunologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Alharbi2020 - Tumor and immune system competition Lab
    question: Does the modeled immune module restrain tumor burden or amplify treatment-relevant
      activity?
    answer_focus: tumor burden, immune effector activity, treatment terms, and largest
      state excursions
    context: tumor_immunology
    sources:
    - alias: immunology_sbml_alharbi2020_tumor_and_immune_system_competition_biomd0000001052_model
      title: Alharbi2020 - Tumor and immune system competition
      visual_scope: Tumor-immune burden
      observables:
      - id: I
        label: Unresolved Tumor Observable 1
      - id: N
        label: Unresolved Tumor Observable 2
      - id: T
        label: Unresolved Tumor Observable 3
  communication_step: 1.0
runtime:
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: immunology_sbml_alharbi2020_tumor_and_immune_system_competition_biomd0000001052_model_state
    maps_to: immunology_sbml_alharbi2020_tumor_and_immune_system_competition_biomd0000001052_model.state
    description: Core state record.
  - name: immunology_sbml_alharbi2020_tumor_and_immune_system_competition_biomd0000001052_model_summary
    maps_to: immunology_sbml_alharbi2020_tumor_and_immune_system_competition_biomd0000001052_model.summary
    description: Core summary record.
  - name: immunology_sbml_alharbi2020_tumor_and_immune_system_competition_biomd0000001052_model_species_labels
    maps_to: immunology_sbml_alharbi2020_tumor_and_immune_system_competition_biomd0000001052_model.species_labels
    description: Core source-label map.
  outputs: []
