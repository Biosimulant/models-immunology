schema_version: '2.0'
title: Bidot2008 - Mathematical modelling of T cell activation kinetics
description: Mathematical modeling representing Tcell actiavtion regualtion by TCR,
  IL2 and other players. It can be used to explore immune response dynamics and compare
  pathway-level behavior across conditions.
standard: other
tags:
- immunology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- C Bidot
- F Gruy
- C-S Haudin
- F El Hentati
- B Guy
upstream:
  id: biomodels_ebi:MODEL1910290003
  source_db: biomodels_ebi
  source_id: MODEL1910290003
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL1910290003
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL1910290003?filename=Bidot2008.xml
  license: CC0
biosim:
  entrypoint: src.bidot2008_mathematical_modelling_of_t_cell_activ_model1910290003_model:Bidot2008MathematicalModellingOfTCellActivModel1910290003Model
  init_kwargs:
    model_path: data/MODEL1910290003.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
io:
