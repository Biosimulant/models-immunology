    units: native source value
    description: Initial CD4 CD8 Binding State. Sets the initial value of bundled
      SBML species `CD4_8`.
  - name: initial_cd28_cd80_costimulation_complex
    maps_to: CD28_CD80
    label: Initial Cd28 Cd80 Costimulation Complex
    default: 1.0
    units: native source value
    description: Initial Cd28 Cd80 Costimulation Complex. Sets the initial value of
      bundled SBML species `CD28_CD80`.
  - name: initial_tl_0
    maps_to: TL_0
    label: Initial Tl 0
    default: 1.0
    units: native source value
    description: Initial Tl 0. Sets the initial value of bundled SBML species `TL_0`.
  - name: initial_unresolved_immune_observable_1
    maps_to: T_0
    label: Initial Unresolved Immune Observable 1
    default: 1.0
    units: native source value
    description: Initial Unresolved Immune Observable 1. Sets the initial value of
      bundled SBML species `T_0`.
  - name: initial_unresolved_immune_observable_2
    maps_to: T_i
    label: Initial Unresolved Immune Observable 2
    default: 1.0
    units: native source value
    description: Initial Unresolved Immune Observable 2. Sets the initial value of
      bundled SBML species `T_i`.
  outputs:
  - name: cd4_cd8_binding_state
    maps_to: CD4_8
    label: CD4 CD8 Binding State
    description: CD4 CD8 Binding State. Maps to bundled source symbol `CD4_8`.
  - name: cd28_cd80_costimulation_complex
    maps_to: CD28_CD80
    label: Cd28 Cd80 Costimulation Complex
    description: Cd28 Cd80 Costimulation Complex. Maps to bundled source symbol `CD28_CD80`.
  - name: tl_0
    maps_to: TL_0
    label: Tl 0
    description: Tl 0. Maps to bundled source symbol `TL_0`.
  - name: unresolved_immune_observable_1
    maps_to: T_0
    label: Unresolved Immune Observable 1
    description: Unresolved Immune Observable 1. Maps to bundled source symbol `T_0`.
  - name: unresolved_immune_observable_2
    maps_to: T_i
    label: Unresolved Immune Observable 2
    description: Unresolved Immune Observable 2. Maps to bundled source symbol `T_i`.
  - name: state
