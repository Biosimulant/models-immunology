schema_version: '2.0'
title: Almuallem2020 - Virus-macrophage-tumour interactions in oncolytic viral therapies
description: This mathematical model of the role of the innate immune responses generated
  by macrophages in the context of anti-tumour oncolytic viral therapies is described
  in the publication:Nada Almuallem, Dumi. It can be used to explore immune response
  dynamics and compare pathway-level behavior across conditions.
standard: other
tags:
- immunology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Nada Almuallem
- Dumitru Trucu
- R Eftimie
upstream:
  id: biomodels_ebi:BIOMD0000001033
  source_db: biomodels_ebi
  source_id: BIOMD0000001033
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000001033
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000001033?filename=Almuallem2020.xml
  license: CC0
biosim:
  entrypoint: src.almuallem2020_virus_macrophage_tumour_interactio_biomd0000001033_model:Almuallem2020VirusMacrophageTumourInteractioBiomd0000001033Model
  init_kwargs:
    model_path: data/BIOMD0000001033.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
io:
  inputs:
  - name: initial_infected_tumour_cells
    maps_to: Infected_tumour_cells
    label: Initial Infected Tumour Cells
    default: 0.0
    units: native source value
    description: Initial Infected Tumour Cells. Sets the initial value of bundled
      SBML species `Infected_tumour_cells`.
  - name: initial_uninfected_tumour_cells
    maps_to: Uninfected_tumour_cells
    label: Initial Uninfected Tumour Cells
    default: 0.0005
    units: native source value
    description: Initial Uninfected Tumour Cells. Sets the initial value of bundled
      SBML species `Uninfected_tumour_cells`.
  - name: initial_oncolytic_viruses
    maps_to: Oncolytic_viruses
    label: Initial Oncolytic Viruses
    default: 1.0e-05
    units: native source value
    description: Initial Oncolytic Viruses. Sets the initial value of bundled SBML
      species `Oncolytic_viruses`.
  - name: initial_unresolved_tumor_observable_1
    maps_to: M1_macrophages
    label: Initial Unresolved Tumor Observable 1
    default: 2.5e-06
    units: native source value
    description: Initial Unresolved Tumor Observable 1. Sets the initial value of
      bundled SBML species `M1_macrophages`.
  - name: initial_uninfected_m2_macrophages
    maps_to: Uninfected_M2_macrophages
    label: Initial Uninfected M2 Macrophages
    default: 2.5e-07
    units: native source value
    description: Initial Uninfected M2 Macrophages. Sets the initial value of bundled
      SBML species `Uninfected_M2_macrophages`.
  - name: tumour_growth_production_rate
    maps_to: r
    label: Tumour Growth Production Rate
    default: 0.62
    units: native source value
    description: Tumour Growth Production Rate. Sets bundled SBML parameter `r`.
  outputs:
  - name: infected_tumour_cells
    maps_to: Infected_tumour_cells
    label: Infected Tumour Cells
    description: Infected Tumour Cells. Maps to bundled source symbol `Infected_tumour_cells`.
  - name: uninfected_tumour_cells
    maps_to: Uninfected_tumour_cells
    label: Uninfected Tumour Cells
    description: Uninfected Tumour Cells. Maps to bundled source symbol `Uninfected_tumour_cells`.
  - name: oncolytic_viruses
    maps_to: Oncolytic_viruses
    label: Oncolytic Viruses
    description: Oncolytic Viruses. Maps to bundled source symbol `Oncolytic_viruses`.
  - name: unresolved_tumor_observable_1
    maps_to: M1_macrophages
    label: Unresolved Tumor Observable 1
    description: Unresolved Tumor Observable 1. Maps to bundled source symbol `M1_macrophages`.
  - name: uninfected_m2_macrophages
    maps_to: Uninfected_M2_macrophages
    label: Uninfected M2 Macrophages
    description: Uninfected M2 Macrophages. Maps to bundled source symbol `Uninfected_M2_macrophages`.
  - name: state
    description: Full source state record for reproducibility and downstream visualisation.
  - name: summary
    description: Run summary computed from the source model state.
  - name: species_labels
    description: Mapping from source state identifiers to display labels.
